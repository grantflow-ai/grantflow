name: Terraform CI

on:
  pull_request:
    branches:
      - main
      - development*
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OpenTofu Format
        uses: dflook/terraform-fmt-check@v1
        with:
          path: terraform
          command: tofu

  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OpenTofu Validate
        uses: dflook/terraform-validate@v1
        with:
          path: terraform
          command: tofu

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.57.0

      - name: Initialize TFLint
        run: |
          cd terraform
          tflint --init

      - name: Run TFLint
        run: |
          cd terraform
          tflint --format compact

  plan:
    name: Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [fmt, validate, tflint]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OpenTofu Plan
        uses: dflook/terraform-plan@v1
        with:
          path: terraform
          command: tofu
          var_file: terraform/terraform.tfvars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
