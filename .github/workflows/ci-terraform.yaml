name: Terraform CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - ".github/actions/setup-task/**"
            - "terraform/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - ".github/actions/setup-task/**"
            - "terraform/**"

permissions:
    contents: read


concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true
jobs:
    fmt:
        name: Format Check
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup OpenTofu
              uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: latest
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check Format
              run: |
                  cd terraform
                  tofu fmt -check -recursive

    validate:
        name: Validate
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup OpenTofu
              uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: latest
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Initialize OpenTofu (validation only, no backend)
              run: |
                  cd terraform/environments/staging
                  # Local state initialization for validation purposes only
                  # This validates the Terraform configuration without needing GCP credentials
                  tofu init -backend=false

            - name: Validate OpenTofu
              run: |
                  cd terraform/environments/staging
                  tofu validate

    tflint:
        name: TFLint
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup TFLint
              uses: terraform-linters/setup-tflint@v6
              with:
                  tflint_version: v0.57.0

            - name: Initialize TFLint
              run: tflint --init

            - name: Run TFLint
              run: |
                  cd terraform/environments/staging
                  tflint --format compact
