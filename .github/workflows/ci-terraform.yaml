name: Terraform CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - "terraform/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - "terraform/**"

jobs:
    fmt:
        name: Format Check
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup OpenTofu
              uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: latest
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check Format
              run: |
                  cd terraform
                  tofu fmt -check -recursive

    validate:
        name: Validate
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Task
              uses: ./.github/actions/setup-task

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Generate cloud functions requirements
              run: task cloud-functions:generate-requirements

            - name: Setup OpenTofu
              uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: latest
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Initialize OpenTofu
              run: |
                  cd terraform/environments/staging
                  tofu init -backend-config="bucket=grantflow-terraform-state" -backend-config="prefix=staging"

            - name: Validate OpenTofu
              run: |
                  cd terraform/environments/staging
                  tofu validate

    tflint:
        name: TFLint
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup TFLint
              uses: terraform-linters/setup-tflint@v4
              with:
                  tflint_version: v0.57.0

            - name: Initialize TFLint
              run: tflint --init

            - name: Run TFLint
              run: |
                  cd terraform/environments/staging
                  tflint --format compact