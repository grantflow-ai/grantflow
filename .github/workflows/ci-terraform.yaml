name: Terraform CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - "terraform/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-terraform.yaml"
            - "terraform/**"

jobs:
    fmt:
        name: Format Check
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: OpenTofu Format
              uses: dflook/tofu-fmt-check@v1
              with:
                  path: terraform/environments/staging

    validate:
        name: Validate
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: OpenTofu Validate
              uses: dflook/tofu-validate@v1
              with:
                  path: terraform/environments/staging
                  backend_config: |
                      bucket=grantflow-terraform-state
                      prefix=staging

    tflint:
        name: TFLint
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup TFLint
              uses: terraform-linters/setup-tflint@v4
              with:
                  tflint_version: v0.57.0

            - name: Initialize TFLint
              run: tflint --init

            - name: Run TFLint
              run: |
                  cd terraform/environments/staging
                  tflint --format compact