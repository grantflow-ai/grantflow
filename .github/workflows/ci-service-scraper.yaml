name: Scraper Service CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-service-scraper.yaml"
            - "packages/**"
            - "services/scraper/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-service-scraper.yaml"
            - "packages/**"
            - "services/scraper/**"

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Tests
              uses: ./.github/actions/run-python-tests
              with:
                  target: scraper
                  chromium: true