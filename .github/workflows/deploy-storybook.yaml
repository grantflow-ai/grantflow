name: Deploy Storybook to GitHub Pages

on:
    push:
        branches:
            - development
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.build-publish.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  package_json_file: frontend/package.json
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Install Dependencies
              run: cd frontend && pnpm install

            - name: Build Storybook
              run: cd frontend && pnpm build-storybook
              env:
                  NEXT_PUBLIC_SITE_URL: https://grantflow-ai.github.io/monorepo
                  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
                  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
                  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
                  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
                  NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID }}
                  NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID }}
                  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
                  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
                  NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
                  NEXT_PUBLIC_MAILGUN_API_KEY: ${{ secrets.NEXT_PUBLIC_MAILGUN_API_KEY }}
                  NEXT_PUBLIC_SEGMENT_WRITE_KEY: ${{ secrets.NEXT_PUBLIC_SEGMENT_WRITE_KEY }}
                  NEXT_PUBLIC_DEBUG: false
                  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

            - name: Copy HTML files from docs
              run: |
                  if [ -d "docs" ] && ls docs/*.html 1> /dev/null 2>&1; then
                    cp docs/*.html frontend/storybook-static/
                  fi

            - name: Upload to GitHub Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: frontend/storybook-static

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4