name: "Build: Scraper"

on:
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/build-service-scraper.yaml"
            - ".github/actions/**"
            - "packages/shared_utils/src/**"
            - "services/scraper/src/**"
    release:
        types: [published]
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: docker-build-runner
        timeout-minutes: 15
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set image tag
              id: tag
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                      echo "image_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                      echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
                  else
                      echo "image_tag=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
                  fi

            - name: Build and push service
              uses: ./.github/actions/build-service
              with:
                  service: scraper
                  image_tag: ${{ steps.tag.outputs.image_tag }}
                  workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
                  service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
        outputs:
            image_tag: ${{ steps.tag.outputs.image_tag }}

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set environment variables
              run: |
                  if [ "${{ github.ref }}" == "refs/heads/main" ]; then
                      echo "PROJECT_ID=grantflow" >> $GITHUB_ENV
                      echo "ENVIRONMENT=production" >> $GITHUB_ENV
                  else
                      echo "PROJECT_ID=grantflow" >> $GITHUB_ENV
                      echo "ENVIRONMENT=staging" >> $GITHUB_ENV
                  fi

            - name: Deploy to Cloud Run
              uses: ./.github/actions/deploy-cloud-run
              with:
                  service: scraper
                  image_tag: ${{ needs.build-and-push.outputs.image_tag }}
                  environment: ${{ env.ENVIRONMENT }}
                  project_id: ${{ env.PROJECT_ID }}
                  workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
                  service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
