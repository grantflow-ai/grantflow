name: "Build Service"

on:
  workflow_call:
    inputs:
      service:
        description: "Service name to build"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes for the workflow"
        required: false
        type: number
        default: 30
    outputs:
      image_tag:
        description: "The Docker image tag that was built"
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: "The Docker image digest"
        value: ${{ jobs.build.outputs.image_digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.config.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve environment
        id: config
        uses: ./.github/actions/resolve-environment

      - name: Build and push service
        id: build
        uses: ./.github/actions/build-service
        with:
          service: ${{ inputs.service }}
          image_tag: ${{ steps.config.outputs.image_tag }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}