name: "Build Service"

on:
  workflow_call:
    inputs:
      service:
        description: "Service name to build"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes for the workflow"
        required: false
        type: number
        default: 30
    outputs:
      image_tag:
        description: "The Docker image tag that was built"
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: "The Docker image digest"
        value: ${{ jobs.build.outputs.image_digest }}

jobs:
  build:
    runs-on: ubuntu-latest-m
    timeout-minutes: ${{ inputs.timeout }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.config.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve environment
        id: config
        uses: ./.github/actions/resolve-environment

      - name: Set build args for frontend
        id: build_args
        if: inputs.service == 'frontend'
        shell: bash
        run: |
          cat << 'EOF' >> $GITHUB_OUTPUT
          args<<BUILDARGS
          NEXT_PUBLIC_BUILD_ID=${{ steps.config.outputs.image_tag }}
          NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL=${{ steps.config.outputs.backend_url }}
          NEXT_PUBLIC_CRDT_SERVER_URL=${{ steps.config.outputs.crdt_url }}
          NEXT_PUBLIC_SITE_URL=${{ steps.config.outputs.site_url }}
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          BUILDARGS
          EOF

      - name: Build and push service
        id: build
        uses: ./.github/actions/build-service
        with:
          service: ${{ inputs.service }}
          image_tag: ${{ steps.config.outputs.image_tag }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
          build_args: ${{ steps.build_args.outputs.args || '' }}
