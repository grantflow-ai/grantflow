name: Backend CI

on:
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'functions/**'
      - 'packages/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'packages/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        target: [ backend, indexer, crawler,db, shared_utils, gcs_notifier ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --dev

      - name: Cache and Install APT Packages
        if: ${{ matrix.target == 'indexer' }}
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr pandoc
          version: 1.0

      - name: Install Playwright Chromium
        if: ${{ matrix.target == 'crawler' }}
        run: uv run playwright install chromium --with-deps

      - name: Run Tests for Modified Services
        if: ${{ contains(github.event.pull_request.changed_files, format('services/{0}/', matrix.target)) || contains(github.event.pull_request.changed_files, format('packages/{0}/', matrix.target)) || contains(github.event.pull_request.changed_files, format('functions/{0}/', matrix.target)) }}
        run: |
          if [[ "${{ matrix.target }}" == "shared_utils" || "${{ matrix.target }}" == "db" ]]; then
            PYTHONPATH=. uv run pytest packages/${{ matrix.target }}/tests -v
          elif [[ "${{ matrix.target }}" == "gcs_notifier" ]]; then
            PYTHONPATH=. uv run pytest functions/${{ matrix.target }}/tests -v
          else
            PYTHONPATH=. uv run pytest services/${{ matrix.target }}/tests -v
