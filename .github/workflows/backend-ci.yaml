name: Backend CI

on:
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'packages/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --dev

      - name: Test Backend
        run: PYTHONPATH=. uv run pytest services/backend/tests -v

  indexer-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache and Install APT Packages (Linux)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr pandoc
          version: 1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --dev

      - name: Test Indexer
        run: PYTHONPATH=. uv run pytest services/indexer/tests -v

  db-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --dev

      - name: Test DB Package
        run: PYTHONPATH=. uv run pytest packages/db/tests -v

  shared-utils-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --dev

      - name: Test Shared Utils Package
        run: PYTHONPATH=. uv run pytest packages/shared_utils/tests -v
