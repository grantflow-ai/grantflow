name: CRDT Server Service CI

on:
  pull_request:
    branches:
      - main
      - development*
    paths:
      - ".github/workflows/ci-service-crdt.yaml"
      - ".github/actions/setup-node-workspace/**"
      - "crdt/**"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
      - development
    paths:
      - ".github/workflows/ci-service-crdt.yaml"
      - ".github/actions/setup-node-workspace/**"
      - "crdt/**"
      - "package.json"
      - "pnpm-lock.yaml"


concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-workspace

      - name: Run Tests
        run: cd crdt && pnpm run test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-workspace

      - name: Lint
        run: cd crdt && pnpm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-workspace

      - name: Build
        run: cd crdt && pnpm run build
