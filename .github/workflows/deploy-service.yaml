name: Deploy Service Reusable Workflow

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Name of the service to deploy'
        required: true
        type: string
      image-tag:
        description: 'Git SHA or other tag for the image'
        required: true
        type: string

env:
  PROJECT_ID: 'grantflow'
  ARTIFACT_REGISTRY: 'us-east1-docker.pkg.dev'
  SERVICE_ACCOUNT: 'githubactions@grantflow.iam.gserviceaccount.com'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool'

jobs:
  build-and-push:
    runs-on: ubuntu-latest-m
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          project_id: ${{ env.PROJECT_ID }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          registry: ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and push ${{ inputs.service-name }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ github.workspace }}
          file: services/${{ inputs.service-name }}/Dockerfile
          cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ inputs.service-name }}:buildcache
          cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ inputs.service-name }}:buildcache,mode=max
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ inputs.service-name }}:latest
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ inputs.service-name }}:${{ inputs.image-tag }}
