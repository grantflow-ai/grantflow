name: Frontend CI

on:
    pull_request:
        branches:
            - main
            - development
        paths:
            - "frontend/**"
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"
    push:
        branches:
            - main
            - development
        paths:
            - "frontend/**"
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"

env:
    NODE_OPTIONS: "--max_old_space_size=4096"

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Run tests
              run: cd frontend && pnpm test

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Type check
              run: cd frontend && pnpm typecheck

    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Lint
              run: cd frontend && pnpm lint