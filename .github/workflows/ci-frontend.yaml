name: Frontend CI

on:
    pull_request:
        branches:
            - main
            - development
        paths:
            - "frontend/**"
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"
            - "taskfile.yaml"
            - "docker-compose.yaml"
    push:
        branches:
            - main
            - development
        paths:
            - "frontend/**"
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"
            - "taskfile.yaml"
            - "docker-compose.yaml"

env:
    NODE_OPTIONS: "--max_old_space_size=4096"

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Run tests
              run: cd frontend && pnpm test

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Type check
              run: cd frontend && pnpm typecheck

    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Lint
              run: cd frontend && pnpm lint

    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Install Playwright browsers
              run: cd frontend && pnpm exec playwright install chromium --with-deps

            - name: Run E2E tests (mocked backend)
              run: cd frontend && pnpm test:e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 30
