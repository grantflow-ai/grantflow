name: Frontend CI

on:
    pull_request:
        branches:
            - main
            - development
        paths:
            - "frontend/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"
    push:
        branches:
            - main
            - development
            - fix/e2e-test-improvements
        paths:
            - "frontend/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-frontend.yaml"
            - ".github/actions/setup-node-workspace/**"

env:
    NODE_OPTIONS: "--max_old_space_size=4096"


concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true
jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Frontend Environment
              uses: ./.github/actions/setup-frontend-env

            - name: Setup Node.js and Dependencies
              uses: ./.github/actions/setup-node-workspace
              with:
                  package: frontend

            - name: Run Tests
              run: cd frontend && pnpm run test

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js and Dependencies
              uses: ./.github/actions/setup-node-workspace
              with:
                  package: frontend

            - name: Type Check
              run: cd frontend && pnpm run typecheck

    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js and Dependencies
              uses: ./.github/actions/setup-node-workspace
              with:
                  package: frontend

            - name: Lint
              run: cd frontend && pnpm run lint

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Frontend Environment
              uses: ./.github/actions/setup-frontend-env

            - name: Setup Node.js and Dependencies
              uses: ./.github/actions/setup-node-workspace
              with:
                  package: frontend

            - name: Build Next.js App
              run: cd frontend && pnpm run build

    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.ref == 'refs/heads/fix/e2e-test-improvements'
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Frontend Environment
              uses: ./.github/actions/setup-frontend-env
              with:
                  environment: e2e
                  port: "3001"

            - name: Setup Node.js and Dependencies
              uses: ./.github/actions/setup-node-workspace
              with:
                  package: frontend

            - name: Install Playwright Browsers
              run: cd frontend && pnpm exec playwright install --with-deps chromium

            - name: Run E2E Tests
              run: cd frontend && pnpm run test:e2e:mock

            - name: Upload E2E Test Results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: e2e-test-results
                  path: |
                      frontend/test-results/
                      frontend/playwright-report/
                  retention-days: 30
