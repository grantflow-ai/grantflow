name: Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'

env:
  DOCKER_REGISTRY: us-east1-docker-docker.pkg.dev

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend service
        uses: ./.github/actions/deploy-service
        with:
          service-name: backend
          docker-registry: ${{ env.DOCKER_REGISTRY }}
          image-tag: ${{ github.sha }}

  deploy-indexer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy indexer service
        uses: ./.github/actions/deploy-service
        with:
          service-name: indexer
          docker-registry: ${{ env.DOCKER_REGISTRY }}
          image-tag: ${{ github.sha }}

  deploy-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy crawler service
        uses: ./.github/actions/deploy-service
        with:
          service-name: crawler
          docker-registry: ${{ env.DOCKER_REGISTRY }}
          image-tag: ${{ github.sha }}
