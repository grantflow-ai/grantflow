name: "Build Backend"

on:
  push:
    branches:
      - main
      - development
    paths:
      - "services/backend/**"
      - "packages/db/**"
      - "packages/shared_utils/**"
      - ".github/workflows/build-backend.yaml"
      - ".github/actions/build-service/**"

jobs:
  build:
    name: Build Backend
    uses: ./.github/workflows/build-service.yaml
    with:
      service: backend
      timeout: 60
    permissions:
      contents: read
      id-token: write
    secrets: inherit
