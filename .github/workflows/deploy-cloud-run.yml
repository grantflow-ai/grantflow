name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: 
      - "Build and Push (Backend)"
      - "Build and Push (Crawler)" 
      - "Build and Push (Indexer)"
      - "Build and Push (RAG)"
      - "Build and Push (Scraper)"
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'development' || 
       github.event.workflow_run.head_branch == 'main')
    
    permissions:
      contents: read
      id-token: write
      actions: read
    
    strategy:
      matrix:
        service: [backend, crawler, indexer, rag, scraper]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set environment variables
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" == "main" ]; then
            echo "PROJECT_ID=grantflow" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=grantflow" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging-latest" >> $GITHUB_ENV
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          fi

      - name: Get commit SHA
        run: |
          # Get the commit SHA from the triggering workflow
          echo "COMMIT_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          echo "Deploying ${{ matrix.service }} to ${{ env.ENVIRONMENT }}..."
          
          # Construct image URL
          IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/grantflow/${{ matrix.service }}:${{ env.IMAGE_TAG }}"
          
          # Deploy with zero downtime using --no-traffic flag
          gcloud run deploy ${{ matrix.service }} \
            --image "${IMAGE}" \
            --region us-central1 \
            --project ${{ env.PROJECT_ID }} \
            --no-traffic \
            --update-labels "commit-sha=${{ env.SHORT_SHA }},deployed-by=github-actions,environment=${{ env.ENVIRONMENT }}" \
            --update-env-vars "DEPLOYMENT_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Get the new revision name
          REVISION=$(gcloud run revisions list \
            --service=${{ matrix.service }} \
            --region=us-central1 \
            --project=${{ env.PROJECT_ID }} \
            --format='value(name)' \
            --limit=1)
          
          echo "revision=${REVISION}" >> $GITHUB_OUTPUT

      - name: Health check
        id: health
        run: |
          echo "Performing health check for ${{ matrix.service }}..."
          
          # Get service URL
          URL=$(gcloud run services describe ${{ matrix.service }} \
            --region=us-central1 \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          
          # Different health check strategies per service
          if [ "${{ matrix.service }}" == "backend" ]; then
            # Backend has a public health endpoint
            HEALTH_URL="${URL}/health"
            echo "Checking ${HEALTH_URL}..."
            
            for i in {1..5}; do
              if curl -f "${HEALTH_URL}" --max-time 10 2>/dev/null; then
                echo "Health check passed!"
                echo "healthy=true" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done
            
            echo "Health check failed after 5 attempts"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          else
            # Other services require authentication, just check if revision is ready
            echo "Checking revision status..."
            
            for i in {1..10}; do
              STATUS=$(gcloud run revisions describe ${{ steps.deploy.outputs.revision }} \
                --service=${{ matrix.service }} \
                --region=us-central1 \
                --project=${{ env.PROJECT_ID }} \
                --format='value(status.conditions[0].status)')
              
              if [ "${STATUS}" == "True" ]; then
                echo "Revision is ready!"
                echo "healthy=true" >> $GITHUB_OUTPUT
                exit 0
              fi
              
              echo "Revision status: ${STATUS}, waiting..."
              sleep 10
            done
            
            echo "Revision failed to become ready"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Route traffic
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo "Routing traffic to new revision..."
          
          gcloud run services update-traffic ${{ matrix.service }} \
            --to-latest \
            --region us-central1 \
            --project ${{ env.PROJECT_ID }}
          
          echo "✅ Successfully deployed ${{ matrix.service }} to ${{ env.ENVIRONMENT }}"

      - name: Rollback on failure
        if: failure() && steps.deploy.outputs.revision != ''
        run: |
          echo "⚠️ Rolling back ${{ matrix.service }}..."
          
          # Get the previous revision
          PREVIOUS=$(gcloud run revisions list \
            --service=${{ matrix.service }} \
            --region=us-central1 \
            --project=${{ env.PROJECT_ID }} \
            --format='value(name)' \
            --limit=2 | tail -1)
          
          if [ -n "${PREVIOUS}" ]; then
            gcloud run services update-traffic ${{ matrix.service }} \
              --to-revisions=${PREVIOUS}=100 \
              --region us-central1 \
              --project ${{ env.PROJECT_ID }}
            
            echo "Rolled back to revision: ${PREVIOUS}"
          fi

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Determine overall status
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            COLOR="3066993"  # Green
            TITLE="✅ Cloud Run Deployment Successful"
            DESCRIPTION="All services deployed successfully to ${{ github.event.workflow_run.head_branch }}"
          else
            COLOR="15158332"  # Red
            TITLE="❌ Cloud Run Deployment Failed"
            DESCRIPTION="One or more services failed to deploy"
          fi
          
          # Send Discord webhook
          curl -X POST $DISCORD_WEBHOOK \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "'"${TITLE}"'",
                "description": "'"${DESCRIPTION}"'",
                "color": '"${COLOR}"',
                "fields": [
                  {
                    "name": "Branch",
                    "value": "`'"${{ github.event.workflow_run.head_branch }}"'`",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "`'"$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)"'`",
                    "inline": true
                  },
                  {
                    "name": "Triggered by",
                    "value": "'"${{ github.event.workflow_run.actor.login }}"'",
                    "inline": true
                  }
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }'