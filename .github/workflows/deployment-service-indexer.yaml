name: Build and Push (Indexer)

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/src/**'
      - 'services/indexer/src/**'
  release:
    types: [published]

jobs:
  build-and-push-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and push Docker image
        uses: ./.github/actions/deploy-service
        with:
          service-name: indexer
          image-tag: dev-${{ github.sha }}

  build-and-push-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy service to prod
        uses: ./.github/actions/deploy-service
        with:
          service-name: indexer
          image-tag: ${{ github.event.release.tag_name }}
