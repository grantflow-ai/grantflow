name: "Deploy with Terraform"

on:
  push:
    paths:
      - '.github/workflows/deploy-terraform.yaml'
    branches:
      - main
      - development

  workflow_run:
    workflows:
      - "Build Backend"
      - "Build Crawler"
      - "Build Indexer"
      - "Build RAG"
      - "Build Scraper"
      - "Build CRDT Server"
      - "Build Frontend"
    types:
      - completed
    branches:
      - main
      - development

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      services:
        description: 'Services to deploy (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      auto_approve:
        description: 'Skip manual approval for apply'
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect-build-info:
    name: Collect Build Information
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      services_to_deploy: ${{ steps.services.outputs.services }}
      image_digests: ${{ steps.artifacts.outputs.digests }}
      backend_digest: ${{ steps.artifacts.outputs.digest_backend }}
      crawler_digest: ${{ steps.artifacts.outputs.digest_crawler }}
      indexer_digest: ${{ steps.artifacts.outputs.digest_indexer }}
      rag_digest: ${{ steps.artifacts.outputs.digest_rag }}
      scraper_digest: ${{ steps.artifacts.outputs.digest_scraper }}
      crdt_digest: ${{ steps.artifacts.outputs.digest_crdt }}
      frontend_digest: ${{ steps.artifacts.outputs.digest_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github

      - name: Resolve environment
        id: config
        uses: ./.github/actions/resolve-environment

      - name: Determine services to deploy
        id: services
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SERVICES="${{ inputs.services || 'all' }}"
          else
            # For workflow_run, deploy the service that triggered it
            WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
            case "$WORKFLOW_NAME" in
              "Build Backend") SERVICES="backend" ;;
              "Build Crawler") SERVICES="crawler" ;;
              "Build Indexer") SERVICES="indexer" ;;
              "Build RAG") SERVICES="rag" ;;
              "Build Scraper") SERVICES="scraper" ;;
              "Build CRDT Server") SERVICES="crdt" ;;
              "Build Frontend") SERVICES="frontend" ;;
              *) SERVICES="all" ;;
            esac
          fi
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

      - name: Check deployment conditions
        id: check
        uses: actions/github-script@v8
        env:
          SERVICES_TO_DEPLOY: ${{ steps.services.outputs.services }}
        with:
          script: |
            // For workflow_run events
            if (context.eventName === 'workflow_run') {
              const conclusion = context.payload.workflow_run.conclusion;
              if (conclusion !== 'success') {
                console.log(`Triggering workflow failed with conclusion: ${conclusion}`);
                core.setOutput('should_deploy', 'false');
                return;
              }

              // Store workflow run ID for artifact retrieval
              core.exportVariable('TRIGGERING_RUN_ID', context.payload.workflow_run.id);
              core.setOutput('should_deploy', 'true');
              return;
            }

            // For manual dispatch, check if requested services have recent successful builds
            if (context.eventName === 'workflow_dispatch') {
              const servicesRaw = process.env.SERVICES_TO_DEPLOY || '';
              const services = servicesRaw.split(',').map(s => s.trim());

              if (services.includes('all') || services.length === 0) {
                // Deploying all services - check all builds exist
                const requiredWorkflows = [
                  'Build Backend', 'Build Crawler', 'Build Indexer',
                  'Build RAG', 'Build Scraper', 'Build CRDT Server', 'Build Frontend'
                ];

                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch: context.ref.replace('refs/heads/', ''),
                  status: 'success',
                  per_page: 20
                });

                const recentSuccessful = new Set(
                  runs.workflow_runs
                    .filter(run => {
                      const age = Date.now() - new Date(run.created_at).getTime();
                      return age < 24 * 60 * 60 * 1000; // 24 hours
                    })
                    .map(run => run.name)
                );

                const allBuilt = requiredWorkflows.every(name => recentSuccessful.has(name));

                if (!allBuilt) {
                  console.log('Warning: Not all services have recent successful builds');
                  console.log('Missing:', requiredWorkflows.filter(w => !recentSuccessful.has(w)));
                }
              }

              core.setOutput('should_deploy', 'true');
            }

      - name: Setup GCP Auth for digest collection
        if: steps.check.outputs.should_deploy == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}

      - name: Collect image digests from builds
        id: artifacts
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          echo "Collecting image digests for services: $SERVICES_TO_DEPLOY"

          # Determine which services to collect digests for
          if [[ "$SERVICES_TO_DEPLOY" == "all" ]]; then
            SERVICES="backend crawler indexer rag scraper crdt frontend"
          else
            SERVICES="$SERVICES_TO_DEPLOY"
          fi

          # Collect digests for each service
          for service in $(echo "$SERVICES" | tr ',' ' '); do
            service=$(echo "$service" | xargs) # trim whitespace
            if [[ -z "$service" ]]; then
              continue
            fi

            echo "Getting digest for $service..."
            repo="us-east1-docker.pkg.dev/grantflow/grantflow/${service}"
            tag="staging-latest"

            if digest=$(gcloud container images describe "${repo}:${tag}" --format="value(image_summary.digest)" 2>/dev/null); then
              if [[ "$digest" =~ ^sha256: ]]; then
                terraform_var="TF_VAR_${service}_image_digest"
                echo "Found digest for $service: $digest"
                echo "$terraform_var=$digest" >> $GITHUB_ENV
                echo "digest_${service}=$digest" >> $GITHUB_OUTPUT
              else
                echo "Warning: Invalid digest format for $service: $digest"
              fi
            else
              echo "Warning: Could not get digest for $service"
            fi
          done
        env:
          SERVICES_TO_DEPLOY: ${{ steps.services.outputs.services }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: collect-build-info
    if: needs.collect-build-info.outputs.should_deploy == 'true'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      TF_VAR_project_id: grantflow
      TF_VAR_image_tag: ${{ needs.collect-build-info.outputs.environment == 'production' && (github.event.workflow_run.head_sha || github.sha) || format('staging-{0}', github.event.workflow_run.head_sha || github.sha) }}
      ENVIRONMENT: ${{ needs.collect-build-info.outputs.environment || inputs.environment }}
      TF_VAR_backend_image_digest: ${{ needs.collect-build-info.outputs.backend_digest }}
      TF_VAR_crawler_image_digest: ${{ needs.collect-build-info.outputs.crawler_digest }}
      TF_VAR_indexer_image_digest: ${{ needs.collect-build-info.outputs.indexer_digest }}
      TF_VAR_rag_image_digest: ${{ needs.collect-build-info.outputs.rag_digest }}
      TF_VAR_scraper_image_digest: ${{ needs.collect-build-info.outputs.scraper_digest }}
      TF_VAR_crdt_image_digest: ${{ needs.collect-build-info.outputs.crdt_digest }}
      TF_VAR_frontend_image_digest: ${{ needs.collect-build-info.outputs.frontend_digest }}
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      plan_output: ${{ steps.plan.outputs.stdout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python and UV
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Prepare Cloud Functions for deployment
        run: ./scripts/prepare-cloud-functions.sh

      - name: Setup GCP Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Verify GCP Authentication
        run: |
          echo "Verifying GCP authentication..."
          gcloud auth list
          gcloud config get-value project
          echo "Application Default Credentials file: $GOOGLE_APPLICATION_CREDENTIALS"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.0

      - name: Initialize Terraform
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          tofu init -upgrade

      - name: Remove orphaned resources from state
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          # Remove staging_frontend if it exists in state (now managed by Firebase App Hosting)
          if tofu state list 2>/dev/null | grep -q "module.additional_resources.google_cloud_run_v2_service.staging_frontend"; then
            echo "Removing staging_frontend from Terraform state (now managed by Firebase App Hosting)"
            tofu state rm module.additional_resources.google_cloud_run_v2_service.staging_frontend || true
          fi

          if tofu state list 2>/dev/null | grep -q "module.additional_resources.google_cloud_run_v2_service_iam_member.staging_frontend_public"; then
            echo "Removing staging_frontend IAM member from Terraform state"
            tofu state rm module.additional_resources.google_cloud_run_v2_service_iam_member.staging_frontend_public || true
          fi

      - name: Terraform Format Check
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          tofu fmt -check -recursive || true

      - name: Terraform Validate
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          tofu validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          # Set target flags based on services to deploy
          SERVICES="${{ needs.collect-build-info.outputs.services_to_deploy }}"
          TARGET_FLAGS=""

          if [[ "$SERVICES" != "all" ]]; then
            # Build target flags for specific services
            IFS=',' read -ra SERVICE_ARRAY <<< "$SERVICES"
            for SERVICE in "${SERVICE_ARRAY[@]}"; do
              SERVICE=$(echo "$SERVICE" | xargs)  # Trim whitespace
              case "$SERVICE" in
                backend) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.backend" ;;
                crawler) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.crawler" ;;
                indexer) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.indexer" ;;
                rag) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.rag" ;;
                scraper) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.scraper" ;;
                crdt) TARGET_FLAGS="$TARGET_FLAGS -target=module.cloud_run.google_cloud_run_v2_service.crdt_server" ;;
                frontend) TARGET_FLAGS="$TARGET_FLAGS -target=module.app_hosting" ;;
              esac
            done
          fi

          set +e
          tofu plan -detailed-exitcode $TARGET_FLAGS -out=tfplan
          EXITCODE=$?
          set -e

          if [ $EXITCODE -eq 0 ]; then
            echo "No changes detected"
            echo "exitcode=0" >> $GITHUB_OUTPUT
          elif [ $EXITCODE -eq 2 ]; then
            echo "Changes detected"
            echo "exitcode=2" >> $GITHUB_OUTPUT

            # Generate plan output for review
            tofu show -no-color tfplan > plan.txt
            echo "stdout<<EOF" >> $GITHUB_OUTPUT
            cat plan.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "Plan failed"
            exit $EXITCODE
          fi

      - name: Upload Plan
        if: always() && hashFiles('terraform/environments/${{ env.ENVIRONMENT }}/tfplan') != ''
        uses: actions/upload-artifact@v5
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}-${{ github.sha }}
          path: terraform/environments/${{ env.ENVIRONMENT }}/tfplan
          retention-days: 7

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v8
        with:
          script: |
            const output = `### Terraform Plan - ${{ env.ENVIRONMENT }}

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [collect-build-info, terraform-plan]
    if: |
      (needs.terraform-plan.outputs.plan_exitcode == '2' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') &&
      github.event_name != 'pull_request'
    environment:
      name: ${{ needs.collect-build-info.outputs.environment || inputs.environment }}
      url: ${{ steps.apply.outputs.app_url }}
    permissions:
      contents: read
      id-token: write
      issues: write
      deployments: write
    env:
      TF_VAR_project_id: grantflow
      TF_VAR_image_tag: ${{ needs.collect-build-info.outputs.environment == 'production' && (github.event.workflow_run.head_sha || github.sha) || format('staging-{0}', github.event.workflow_run.head_sha || github.sha) }}
      ENVIRONMENT: ${{ needs.collect-build-info.outputs.environment || inputs.environment }}
      TF_VAR_backend_image_digest: ${{ needs.collect-build-info.outputs.backend_digest }}
      TF_VAR_crawler_image_digest: ${{ needs.collect-build-info.outputs.crawler_digest }}
      TF_VAR_indexer_image_digest: ${{ needs.collect-build-info.outputs.indexer_digest }}
      TF_VAR_rag_image_digest: ${{ needs.collect-build-info.outputs.rag_digest }}
      TF_VAR_scraper_image_digest: ${{ needs.collect-build-info.outputs.scraper_digest }}
      TF_VAR_crdt_image_digest: ${{ needs.collect-build-info.outputs.crdt_digest }}
      TF_VAR_frontend_image_digest: ${{ needs.collect-build-info.outputs.frontend_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python and UV
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Prepare Cloud Functions for deployment
        run: ./scripts/prepare-cloud-functions.sh

      - name: Setup GCP Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Verify GCP Authentication
        run: |
          echo "Verifying GCP authentication..."
          gcloud auth list
          gcloud config get-value project
          echo "Application Default Credentials file: $GOOGLE_APPLICATION_CREDENTIALS"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.0

      - name: Initialize Terraform
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          tofu init -upgrade

      - name: Download Plan
        uses: actions/download-artifact@v6
        with:
          name: terraform-plan-${{ env.ENVIRONMENT }}-${{ github.sha }}
          path: terraform/environments/${{ env.ENVIRONMENT }}

      - name: Apply Terraform Changes
        id: apply
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          # Apply the plan
          tofu apply -auto-approve tfplan

          # Capture outputs
          echo "app_url=$(tofu output -raw app_hosting_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "backend_url=$(tofu output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `## ✅ Deployment Successful

            **Environment:** ${{ env.ENVIRONMENT }}
            **Commit:** ${{ github.sha }}
            **Frontend URL:** ${{ steps.apply.outputs.app_url }}
            **Backend URL:** ${{ steps.apply.outputs.backend_url }}

            Deployed by @${{ github.actor }} at ${new Date().toISOString()}`;

            // Create a deployment record
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ env.ENVIRONMENT }}',
              description: 'Terraform deployment',
              auto_merge: false,
              required_contexts: [],
              production_environment: '${{ env.ENVIRONMENT }}' === 'production'
            });

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const message = `## ❌ Deployment Failed

            **Environment:** ${{ env.ENVIRONMENT }}
            **Commit:** ${{ github.sha }}
            **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the logs for details.`;

            // Create an issue for the failure
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Failed: ${{ env.ENVIRONMENT }} - ${new Date().toISOString()}`,
              body: message,
              labels: ['deployment-failure', 'infrastructure']
            });