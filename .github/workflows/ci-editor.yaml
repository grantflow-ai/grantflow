name: Editor CI

on:
    pull_request:
        branches:
            - main
            - development
        paths:
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-editor.yaml"
            - ".github/actions/setup-node-workspace/**"
    push:
        branches:
            - main
            - development
        paths:
            - "editor/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/ci-editor.yaml"
            - ".github/actions/setup-node-workspace/**"

env:
    NODE_OPTIONS: "--max_old_space_size=4096"

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Run tests
              run: cd editor && pnpm test

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Type check
              run: cd editor && pnpm typecheck

    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Lint
              run: cd editor && pnpm lint

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build library
              run: cd editor && pnpm build

    e2e-setup:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Install Playwright browsers
              run: cd editor && pnpm exec playwright install --with-deps chromium

            - name: Verify Playwright setup
              run: cd editor && pnpm exec playwright --version
