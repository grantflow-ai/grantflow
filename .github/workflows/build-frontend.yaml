name: "Build Frontend"

on:
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/build-frontend.yaml"
            - ".github/actions/**"
            - "editor/**"
            - "frontend/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
    pull_request:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/build-frontend.yaml"
            - ".github/actions/**"
            - "editor/**"
            - "frontend/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
    release:
        types: [published]
    workflow_dispatch:

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    test:
        name: Test Frontend
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Run type checks
              run: cd frontend && pnpm typecheck

            - name: Run linters
              run: cd frontend && pnpm lint

            - name: Run tests
              run: cd frontend && pnpm test
              env:
                  CI: true

    build:
        name: Build Frontend Bundle
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        if: github.event_name != 'pull_request'
        outputs:
            build_id: ${{ steps.build_info.outputs.build_id }}
            commit_sha: ${{ steps.build_info.outputs.commit_sha }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set build info
              id: build_info
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                      BUILD_ID="${{ github.event.release.tag_name }}"
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                      BUILD_ID="production-${{ github.sha }}"
                  else
                      BUILD_ID="staging-${{ github.sha }}"
                  fi
                  echo "build_id=${BUILD_ID}" >> $GITHUB_OUTPUT
                  echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT

            - name: Setup workspace
              uses: ./.github/actions/setup-node-workspace

            - name: Build editor
              run: cd editor && pnpm build

            - name: Build frontend
              run: cd frontend && pnpm build
              env:
                  NEXT_PUBLIC_BUILD_ID: ${{ steps.build_info.outputs.build_id }}
                  NEXT_PUBLIC_COMMIT_SHA: ${{ github.sha }}

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-build-${{ steps.build_info.outputs.build_id }}
                  path: |
                      frontend/.next/
                      frontend/out/
                      frontend/package.json
                  retention-days: 7