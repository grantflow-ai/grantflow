name: Indexer Service CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-service-indexer.yaml"
            - "packages/db/**"
            - "packages/shared_utils/**"
            - "services/indexer/**"
            - "testing/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-service-indexer.yaml"
            - "packages/db/**"
            - "packages/shared_utils/**"
            - "services/indexer/**"
            - "testing/**"

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Run Tests
              uses: ./.github/actions/run-python-tests
              with:
                  target: indexer