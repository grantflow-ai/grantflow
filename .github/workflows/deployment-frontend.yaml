name: Build and Push (Frontend)

on:
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/deployment-frontend.yaml"
            - "frontend/**"
    release:
        types: [published]

env:
    PROJECT_ID: "grantflow"
    ARTIFACT_REGISTRY: "us-east1-docker.pkg.dev"
    SERVICE_ACCOUNT: "githubactions@grantflow.iam.gserviceaccount.com"
    WORKLOAD_IDENTITY_PROVIDER: "projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool"

jobs:
    build-and-push-staging:
        runs-on: ubuntu-latest-m
        timeout-minutes: 15
        if: github.event_name == 'push' && github.ref == 'refs/heads/development'
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - id: auth
              uses: google-github-actions/auth@v2
              with:
                  token_format: access_token
                  project_id: ${{ env.PROJECT_ID }}
                  service_account: ${{ env.SERVICE_ACCOUNT }}
                  workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  username: oauth2accesstoken
                  password: ${{ steps.auth.outputs.access_token }}
                  registry: ${{ env.ARTIFACT_REGISTRY }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  push: true
                  context: ${{ github.workspace }}/frontend
                  file: frontend/Dockerfile
                  cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache
                  cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache,mode=max
                  tags: |
                      ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:staging-latest
                      ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:staging-${{ github.sha }}

    build-and-push-prod:
        runs-on: ubuntu-latest-m
        timeout-minutes: 15
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - id: auth
              uses: google-github-actions/auth@v2
              with:
                  token_format: access_token
                  project_id: ${{ env.PROJECT_ID }}
                  service_account: ${{ env.SERVICE_ACCOUNT }}
                  workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  username: oauth2accesstoken
                  password: ${{ steps.auth.outputs.access_token }}
                  registry: ${{ env.ARTIFACT_REGISTRY }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  push: true
                  context: ${{ github.workspace }}/frontend
                  file: frontend/Dockerfile
                  cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache
                  cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache,mode=max
                  tags: |
                      ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:latest
                      ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:${{ github.sha }}

    build-and-push-release:
        runs-on: ubuntu-latest-m
        timeout-minutes: 15
        if: github.event_name == 'release'
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - id: auth
              uses: google-github-actions/auth@v2
              with:
                  token_format: access_token
                  project_id: ${{ env.PROJECT_ID }}
                  service_account: ${{ env.SERVICE_ACCOUNT }}
                  workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  username: oauth2accesstoken
                  password: ${{ steps.auth.outputs.access_token }}
                  registry: ${{ env.ARTIFACT_REGISTRY }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  push: true
                  context: ${{ github.workspace }}/frontend
                  file: frontend/Dockerfile
                  cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache
                  cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:buildcache,mode=max
                  tags: |
                      ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/grantflow/frontend:${{ github.event.release.tag_name }}