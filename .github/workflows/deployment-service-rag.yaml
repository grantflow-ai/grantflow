name: Build and Push (Rag)

on:
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/deployment-service-rag.yaml"
            - "packages/**/src/**"
            - "services/rag/src/**"
    release:
        types: [published]

jobs:
    build-and-push-staging:
        uses: ./.github/workflows/deploy-service.yaml
        if: github.event_name == 'push' && github.ref == 'refs/heads/development'
        with:
            service-name: rag
            image-tag: staging-${{ github.sha }}
        permissions:
            contents: read
            id-token: write

    build-and-push-prod:
        uses: ./.github/workflows/deploy-service.yaml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
            service-name: rag
            image-tag: ${{ github.sha }}
        permissions:
            contents: read
            id-token: write

    build-and-push-release:
        uses: ./.github/workflows/deploy-service.yaml
        if: github.event_name == 'release'
        with:
            service-name: rag
            image-tag: ${{ github.event.release.tag_name }}
        permissions:
            contents: read
            id-token: write