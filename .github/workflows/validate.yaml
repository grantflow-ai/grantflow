name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  NODE_OPTIONS: "--max_old_space_size=4096"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Setup Node.js workspace
        uses: ./.github/actions/setup-node-workspace
        with:
          package: frontend

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-packages --all-extras --dev

      - name: Cache Linter and Type Checker Caches
        uses: actions/cache@v4
        with:
          path: |
            frontend/.eslintcache
            .mypy_cache
            .ruff_cache
            ~/.cache/uv
            ~/.cache/pnpm
          key: lint-cache-${{ runner.os }}-${{ hashFiles('uv.lock', 'pnpm-lock.yaml', 'frontend/package.json', 'pyproject.toml', '.prettierrc', 'eslint.config.mjs') }}
          restore-keys: |
            lint-cache-${{ runner.os }}-

      - name: Setup Task
        uses: ./.github/actions/setup-task

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
                - '**/*.py'
                - 'pyproject.toml'
                - 'uv.lock'
            typescript:
                - '**/*.ts'
                - '**/*.tsx'
                - '**/*.js'
                - '**/*.jsx'
                - 'frontend/**'
                - 'crdt/**'
            terraform:
                - 'terraform/**/*.tf'
                - 'terraform/**/*.tfvars'

      - name: Run Python linters
        if: steps.changes.outputs.python == 'true'
        run: task lint:python

      - name: Run Frontend linters
        if: steps.changes.outputs.typescript == 'true'
        run: task lint:frontend

      - name: Run Terraform linters
        if: steps.changes.outputs.terraform == 'true'
        run: task lint:terraform

      - name: Run Codespell
        run: task lint:codespell
