name: Validate

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

env:
    NODE_OPTIONS: "--max_old_space_size=4096"

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version-file: "pyproject.toml"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: packageManager
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: |
                      pnpm-lock.yaml
                      frontend/pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install -r

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Install Dependencies
              run: uv sync --all-packages --all-extras --dev

            - name: Cache Linter and Type Checker Caches
              uses: actions/cache@v4
              with:
                  path: |
                      frontend/.eslintcache
                      .mypy_cache
                      .ruff_cache
                      ~/.cache/uv
                      ~/.cache/pnpm
                  key: lint-cache-${{ runner.os }}-${{ hashFiles('uv.lock', 'pnpm-lock.yaml', 'frontend/package.json', 'pyproject.toml', '.prettierrc', 'eslint.config.mjs') }}
                  restore-keys: |
                      lint-cache-${{ runner.os }}-

            - name: Cache Task Binary
              uses: actions/cache@v4
              with:
                  path: ~/.local/bin/task
                  key: task-${{ runner.os }}-3.x
                  restore-keys: |
                      task-${{ runner.os }}-

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run Linters
              run: task lint