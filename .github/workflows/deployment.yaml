name: Deployment

# Workflow disabled temporarily
on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    # Job disabled temporarily
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.CONTAINER_REGISTRY }}/grantflow/backend:latest,${{ secrets.CONTAINER_REGISTRY }}/grantflow/backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.CONTAINER_REGISTRY }}/grantflow/backend:buildcache
          cache-to: type=registry,ref=${{ secrets.CONTAINER_REGISTRY }}/grantflow/backend:buildcache,mode=max
