name: Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_REGISTRY: us-east1-docker-docker.pkg.dev


jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service: [ backend, indexer ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          project_id: grantflow
          service_account: githubactions@grantflow.iam.gserviceaccount.com
          workload_identity_provider: projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          registry: ${{ env.DOCKER_REGISTRY }}


      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/grantflow/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/grantflow/${{ matrix.service }}:buildcache,mode=max
          tags: ${{ env.DOCKER_REGISTRY }}/grantflow/${{ matrix.service }}:latest,${{ env.DOCKER_REGISTRY }}/grantflow/${{ matrix.service }}:${{ github.sha }}
