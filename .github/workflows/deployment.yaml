name: Deployment

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: us-east1-docker-docker.pkg.dev


jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ backend, indexer ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          cache-from: type=registry,ref=us-east1-docker/grantflow/grantflow/backend:buildcache
          cache-to: type=registry,ref=us-east1-docker/grantflow/grantflow/backend:buildcache,mode=max
          tags: ${{ env.DOCKER_REGISTRY }}/grantflow/backend:latest,${{ env.DOCKER_REGISTRY }}/grantflow/backend:${{ github.sha }}
