name: Backend Service CI

on:
    pull_request:
        branches:
            - main
            - development*
        paths:
            - ".github/workflows/ci-service-backend.yaml"
            - ".github/actions/run-python-tests/**"
            - "packages/db/**"
            - "packages/shared_utils/**"
            - "services/backend/**"
            - "testing/**"
    push:
        branches:
            - main
            - development
        paths:
            - ".github/workflows/ci-service-backend.yaml"
            - ".github/actions/run-python-tests/**"
            - "packages/db/**"
            - "packages/shared_utils/**"
            - "services/backend/**"
            - "testing/**"


concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true
jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Run Tests
              uses: ./.github/actions/run-python-tests
              with:
                  target: backend
