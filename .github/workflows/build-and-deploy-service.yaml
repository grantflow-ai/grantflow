name: "Build & Deploy Service"

on:
  workflow_call:
    inputs:
      service:
        description: "Service name to build and deploy"
        required: true
        type: string
      timeout:
        description: "Timeout in minutes for the workflow"
        required: false
        type: number
        default: 30

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tag and environment
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
              echo "image_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
              echo "image_tag=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "project_id=grantflow" >> $GITHUB_OUTPUT
              echo "environment=production" >> $GITHUB_OUTPUT
          else
              echo "project_id=grantflow" >> $GITHUB_OUTPUT
              echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push service
        uses: ./.github/actions/build-service
        with:
          service: ${{ inputs.service }}
          image_tag: ${{ steps.config.outputs.image_tag }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}

      - name: Deploy to Cloud Run
        uses: ./.github/actions/deploy-cloud-run
        with:
          service: ${{ inputs.service }}
          image_tag: ${{ steps.config.outputs.image_tag }}
          environment: ${{ steps.config.outputs.environment }}
          project_id: ${{ steps.config.outputs.project_id }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER || 'projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool' }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT || 'githubactions@grantflow.iam.gserviceaccount.com' }}
