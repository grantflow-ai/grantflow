name: Scraper E2E Tests

on:
    workflow_dispatch:
        inputs:
            test_markers:
                description: "Test markers to run"
                required: false
                default: "smoke"
                type: choice
                options:
                    - smoke
                    - quality_assessment
                    - e2e_full

jobs:
    e2e-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            DEBUG: "True"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Scraper E2E Tests
              uses: ./.github/actions/run-python-e2e-tests
              with:
                  service: scraper
                  test_markers: ${{ inputs.test_markers || 'smoke' }}
                  timeout: 1800
              env:
                  E2E_TESTS: "1"