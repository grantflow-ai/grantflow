name: Scraper E2E Tests

on:
    workflow_dispatch:
        inputs:
            test_markers:
                description: "Test markers to run"
                required: false
                default: "smoke"
                type: choice
                options:
                    - smoke
                    - quality_assessment
                    - e2e_full

jobs:
    e2e-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            DEBUG: "True"
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js for Firebase CLI
              uses: actions/setup-node@v4
              with:
                  node-version: '18'

            - name: Setup Java for Firestore Emulator
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Cache Firebase Emulator
              uses: actions/cache@v4
              with:
                  path: ~/.cache/firebase/emulators
                  key: firebase-emulators-${{ runner.os }}
                  restore-keys: firebase-emulators-

            - name: Start Firebase Emulator Suite
              uses: invertase/firebase-emulator-action@v1
              with:
                  ports: 'firestore:8080'
                  project_id: 'grantflow-test'
                  # Use cache to avoid re-downloading emulator binaries
                  cache: true

            - name: Run Scraper E2E Tests
              uses: ./.github/actions/run-python-e2e-tests
              with:
                  service: scraper
                  test_markers: ${{ inputs.test_markers || 'smoke' }}
                  timeout: 1800
              env:
                  E2E_TESTS: "1"
                  FIRESTORE_EMULATOR_HOST: "localhost:8080"
                  GCP_PROJECT_ID: "grantflow-test"