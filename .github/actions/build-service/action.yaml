name: "Build Service"
description: "Build and push Docker image for a service using standardized Task-based approach"

inputs:
  service:
    description: "Service name (backend, crawler, indexer, rag, scraper, frontend, crdt)"
    required: true
  image_tag:
    description: "Docker image tag"
    required: true
  workload_identity_provider:
    description: "Workload identity provider"
    required: false
    default: "projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool"
  service_account:
    description: "Service account email"
    required: false
    default: "githubactions@grantflow.iam.gserviceaccount.com"
  build_args:
    description: "Build arguments to pass to Docker build (multiline string)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Maximize disk space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Setup GCP
      id: gcp
      uses: ./.github/actions/setup-gcp
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        username: oauth2accesstoken
        password: ${{ steps.gcp.outputs.access_token }}
        registry: us-east1-docker.pkg.dev

    - name: Set up environment tag
      id: env-tag
      shell: bash
      run: |
        if [[ "${{ inputs.image_tag }}" == staging-* ]]; then
          echo "env_latest=staging-latest" >> $GITHUB_OUTPUT
        else
          echo "env_latest=latest" >> $GITHUB_OUTPUT
        fi


    - name: Set Dockerfile path
      id: dockerfile
      shell: bash
      run: |
        if [[ "${{ inputs.service }}" == "frontend" ]]; then
          echo "path=frontend/Dockerfile" >> $GITHUB_OUTPUT
        elif [[ "${{ inputs.service }}" == "crdt" ]]; then
          echo "path=crdt/Dockerfile" >> $GITHUB_OUTPUT
        else
          echo "path=services/${{ inputs.service }}/Dockerfile" >> $GITHUB_OUTPUT
        fi

    - name: Build and push service
      uses: docker/build-push-action@v6
      with:
        push: true
        context: ${{ github.workspace }}
        file: ${{ steps.dockerfile.outputs.path }}
        cache-from: |
          type=gha,scope=${{ inputs.service }}
          type=registry,ref=us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:buildcache
        cache-to: |
          type=gha,mode=max,scope=${{ inputs.service }}
          type=registry,ref=us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:buildcache,mode=max
        tags: |
          us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:${{ steps.env-tag.outputs.env_latest }}
          us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:${{ inputs.image_tag }}
        build-args: ${{ inputs.build_args }}
