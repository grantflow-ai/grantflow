name: "Build Service"
description: "Build and push Docker image for a service using standardized Task-based approach"

inputs:
    service:
        description: "Service name (backend, crawler, indexer, rag, scraper)"
        required: true
    image_tag:
        description: "Docker image tag"
        required: true
    workload_identity_provider:
        description: "Workload identity provider"
        required: false
        default: "projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool"
    service_account:
        description: "Service account email"
        required: false
        default: "githubactions@grantflow.iam.gserviceaccount.com"

runs:
    using: "composite"
    steps:
        - name: Setup GCP
          id: gcp
          uses: ./.github/actions/setup-gcp
          with:
              workload_identity_provider: ${{ inputs.workload_identity_provider }}
              service_account: ${{ inputs.service_account }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to Container Registry
          uses: docker/login-action@v3
          with:
              username: oauth2accesstoken
              password: ${{ steps.gcp.outputs.access_token }}
              registry: us-east1-docker.pkg.dev

        - name: Set up environment tag
          id: env-tag
          shell: bash
          run: |
              if [[ "${{ inputs.image_tag }}" == staging-* ]]; then
                echo "env_latest=staging-latest" >> $GITHUB_OUTPUT
              else
                echo "env_latest=latest" >> $GITHUB_OUTPUT
              fi

        - name: Build and push service
          uses: docker/build-push-action@v6
          with:
              push: true
              context: ${{ github.workspace }}
              file: services/${{ inputs.service }}/Dockerfile
              cache-from: type=registry,ref=us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:buildcache
              cache-to: type=registry,ref=us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:buildcache,mode=max
              tags: |
                  us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:${{ steps.env-tag.outputs.env_latest }}
                  us-east1-docker.pkg.dev/grantflow/grantflow/${{ inputs.service }}:${{ inputs.image_tag }}