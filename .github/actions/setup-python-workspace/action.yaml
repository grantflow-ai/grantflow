name: "Setup Python Workspace"
description: "Set up Python with uv and install dependencies for the workspace"

inputs:
  install_playwright:
    description: "Install Playwright browsers for scraper service"
    required: false
    default: "false"
  install_apt_packages:
    description: "Install APT packages (tesseract-ocr, pandoc)"
    required: false
    default: "true"
  setup_postgresql:
    description: "Set up PostgreSQL with pgvector"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: "pyproject.toml"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Cache and Install APT Packages
      if: inputs.install_apt_packages == 'true'
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: tesseract-ocr pandoc
        version: 1.0

    - name: Setup PostgreSQL
      if: inputs.setup_postgresql == 'true'
      uses: ./.github/actions/setup-postgresql

    - name: Install Dependencies
      shell: bash
      run: uv sync --all-packages --all-extras --dev --upgrade

    - name: Install Playwright Browsers
      if: inputs.install_playwright == 'true'
      shell: bash
      run: uv run playwright install chromium