name: "Run Backend Tests"
description: "Set up environment and run tests for a specific backend target"

inputs:
    target:
        description: "Target to test (backend, indexer, crawler, db, shared_utils, functions)"
        required: true

runs:
    using: "composite"
    steps:
        - name: Setup Python workspace
          uses: ./.github/actions/setup-python-workspace
          with:
            install_playwright: ${{ inputs.target == 'scraper' }}
            setup_postgresql: ${{ contains(fromJSON('["backend", "indexer", "crawler", "rag", "scraper", "db"]'), inputs.target) }}

        - name: Run Tests
          shell: bash
          run: |
              if [[ "${{ inputs.target }}" == "db" || "${{ inputs.target }}" == "shared_utils" ]]; then
                PYTHONPATH=. uv run pytest packages/${{ inputs.target }} -v
              elif [[ "${{ inputs.target }}" == "functions" ]]; then
                PYTHONPATH=. uv run pytest functions -v
              elif [[ "${{ inputs.target }}" == "backend" ]]; then
                # Run backend tests serially (xdist removed)
                PYTHONPATH=. uv run pytest services/${{ inputs.target }} -v
              else
                PYTHONPATH=. uv run pytest services/${{ inputs.target }} -v
              fi

        