name: "Run Backend Tests"
description: "Set up environment and run tests for a specific backend target"

inputs:
    target:
        description: "Target to test (backend, indexer, crawler, db, shared_utils, functions, rag, scraper)"
        required: true
    chromium:
        description: "Install Chromium for Playwright (for crawler/scraper tests)"
        required: false
        default: 'false'

runs:
    using: "composite"
    steps:
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
              python-version-file: "pyproject.toml"

        - name: Install uv
          uses: astral-sh/setup-uv@v6
          with:
              enable-cache: true

        - name: Cache HuggingFace Models
          uses: actions/cache@v4
          with:
              path: ~/.cache/huggingface
              key: ${{ runner.os }}-huggingface-${{ hashFiles('**/embeddings.py') }}
              restore-keys: |
                  ${{ runner.os }}-huggingface-

        - name: Cache and Install APT Packages
          uses: awalsh128/cache-apt-pkgs-action@latest
          with:
              packages: tesseract-ocr pandoc
              version: 1.0

        - name: Set up PostgreSQL
          shell: bash
          run: |
              # Only set up PostgreSQL for services that need database access
              if [[ "${{ inputs.target }}" == "backend" || "${{ inputs.target }}" == "indexer" || "${{ inputs.target }}" == "crawler" || "${{ inputs.target }}" == "rag" || "${{ inputs.target }}" == "scraper" || "${{ inputs.target }}" == "db" ]]; then
                  # Install PostgreSQL 17 and pgvector
                  sudo apt-get update
                  sudo apt-get install -y wget ca-certificates
                  wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
                  echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
                  sudo apt-get update
                  sudo apt-get install -y postgresql-17 postgresql-client-17 postgresql-contrib-17
                  
                  # Install pgvector extension
                  sudo apt-get install -y postgresql-17-pgvector
                  
                  # Configure PostgreSQL to use version 17 by default
                  sudo pg_createcluster 17 main --start
                  sudo systemctl start postgresql
                  sudo systemctl enable postgresql
                  
                  # Create test user and set up database (using PostgreSQL 17 cluster)
                  sudo -u postgres createuser --superuser runner --port=5433
                  sudo -u postgres psql --port=5433 -c "ALTER USER runner WITH PASSWORD 'testpass';"
                  
                  # Set DATABASE_CONNECTION_STRING for tests (PostgreSQL 17 runs on port 5433)
                  echo "DATABASE_CONNECTION_STRING=postgresql+asyncpg://runner:testpass@localhost:5433/postgres" >> $GITHUB_ENV
                  
                  # Test connection and create vector extension
                  psql "postgresql://runner:testpass@localhost:5433/postgres" -c "SELECT version();"
                  psql "postgresql://runner:testpass@localhost:5433/postgres" -c "CREATE EXTENSION IF NOT EXISTS vector;"
              fi

        - name: Install Dependencies for Target
          shell: bash
          # TODO: temporary fix, we need to handle dependencies for each target better ~keep
          run: uv sync --all-packages --all-extras --dev --upgrade

        - name: Download Embedding Model
          shell: bash
          if: inputs.target == 'rag' || inputs.target == 'indexer' || inputs.target == 'crawler'
          run: |
              # Download the embedding model to cache before running tests
              uv run python -c "
              from sentence_transformers import SentenceTransformer
              import os
              os.environ['TRANSFORMERS_OFFLINE'] = '0'
              print('Downloading/verifying embedding model...')
              model = SentenceTransformer('sentence-transformers/all-MiniLM-L12-v2', device='cpu')
              print('Model ready in cache')
              "

        - name: Install Playwright Browsers (for Scraper)
          shell: bash
          if: inputs.target == 'scraper'
          run: |
              uv run playwright install chromium

        - name: Set up Pub/Sub Emulator (for RAG)
          shell: bash
          if: inputs.target == 'rag'
          run: |
              # Install Google Cloud SDK
              echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
              curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
              sudo apt-get update && sudo apt-get install google-cloud-cli google-cloud-cli-pubsub-emulator

              # Start Pub/Sub emulator in background
              gcloud beta emulators pubsub start --host-port=localhost:8085 &

              # Wait for emulator to be ready
              sleep 10

              # Set environment variables for GitHub Actions
              echo "PUBSUB_EMULATOR_HOST=localhost:8085" >> $GITHUB_ENV
              echo "PUBSUB_PROJECT_ID=grantflow" >> $GITHUB_ENV

              # Create necessary topics and subscriptions using our initialization script
              PYTHONPATH=. PUBSUB_EMULATOR_HOST=localhost:8085 PUBSUB_PROJECT_ID=grantflow uv run python scripts/init-pubsub-emulator.py

        - name: Run Tests
          shell: bash
          run: |
              if [[ "${{ inputs.target }}" == "db" || "${{ inputs.target }}" == "shared_utils" ]]; then
                PYTHONPATH=. uv run pytest packages/${{ inputs.target }} -v
              elif [[ "${{ inputs.target }}" == "functions" ]]; then
                PYTHONPATH=. uv run pytest functions -v
              elif [[ "${{ inputs.target }}" == "backend" ]]; then
                # Run backend tests serially (xdist removed)
                PYTHONPATH=. uv run pytest services/${{ inputs.target }} -v
              elif [[ "${{ inputs.target }}" == "rag" ]]; then
                # Run rag tests with PubSub emulator
                PYTHONPATH=. uv run pytest services/${{ inputs.target }} -v
              else
                PYTHONPATH=. uv run pytest services/${{ inputs.target }} -v
              fi

        