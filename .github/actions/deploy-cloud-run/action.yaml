name: "Deploy to Cloud Run"
description: "Deploy a service to Cloud Run with health checks and zero-downtime deployment"

inputs:
  service:
    description: "Service name (backend, crawler, indexer, rag, scraper, crdt)"
    required: true
  image_tag:
    description: "Docker image tag to deploy"
    required: true
  environment:
    description: "Environment (staging, production)"
    required: true
    default: "staging"
  project_id:
    description: "GCP project ID"
    required: true
    default: "grantflow"
  region:
    description: "GCP region"
    required: true
    default: "us-central1"
  workload_identity_provider:
    description: "Workload identity provider"
    required: false
    default: "projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool"
  service_account:
    description: "Service account email"
    required: false
    default: "githubactions@grantflow.iam.gserviceaccount.com"

outputs:
  service_url:
    description: "Cloud Run service URL"
    value: ${{ steps.deploy.outputs.url }}
  revision:
    description: "Deployed revision name"
    value: ${{ steps.deploy.outputs.revision }}

runs:
  using: "composite"
  steps:
    - name: Setup GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ inputs.project_id }}

    - name: Deploy to Cloud Run with health check
      id: deploy
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ inputs.service }}
        image: us-east1-docker.pkg.dev/${{ inputs.project_id }}/grantflow/${{ inputs.service }}:${{ inputs.image_tag }}
        region: ${{ inputs.region }}
        project_id: ${{ inputs.project_id }}
        labels: |
          commit-sha=${{ github.sha }}
          deployed-by=github-actions
          environment=${{ inputs.environment }}
        env_vars: |
          DEPLOYMENT_TIMESTAMP=${{ github.run_id }}
        flags: |
          --max-instances=1
          --timeout=600
          ${{ inputs.service == 'scraper' && '--allow-unauthenticated' || '' }}

    - name: Wait for service readiness
      shell: bash
      run: |
        echo "Waiting for ${{ inputs.service }} to be ready..."

        # Wait up to 10 minutes for the service to be ready
        for i in {1..60}; do
          STATUS=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ inputs.project_id }} \
            --format='value(status.conditions[0].status)')

          if [ "$STATUS" = "True" ]; then
            echo "✅ Service ${{ inputs.service }} is ready!"
            break
          fi

          echo "Waiting for service readiness... ($i/60)"
          sleep 10
        done

        if [ "$STATUS" != "True" ]; then
          echo "❌ Service failed to become ready within 10 minutes"
          exit 1
        fi
