name: "Deploy to Cloud Run"
description: "Deploy a service to Cloud Run with health checks and zero-downtime deployment"

inputs:
    service:
        description: "Service name (backend, crawler, indexer, rag, scraper)"
        required: true
    image_tag:
        description: "Docker image tag to deploy"
        required: true
    environment:
        description: "Environment (staging, production)"
        required: true
        default: "staging"
    project_id:
        description: "GCP project ID"
        required: true
        default: "grantflow"
    region:
        description: "GCP region"
        required: true
        default: "us-central1"
    workload_identity_provider:
        description: "Workload identity provider"
        required: false
        default: "projects/362880548799/locations/global/workloadIdentityPools/github/providers/github-actions-pool"
    service_account:
        description: "Service account email"
        required: false
        default: "githubactions@grantflow.iam.gserviceaccount.com"

outputs:
    service_url:
        description: "Cloud Run service URL"
        value: ${{ steps.deploy.outputs.url }}
    revision:
        description: "Deployed revision name"
        value: ${{ steps.get-revision.outputs.revision }}

runs:
    using: "composite"
    steps:
        - name: Setup GCP
          uses: google-github-actions/auth@v2
          with:
              workload_identity_provider: ${{ inputs.workload_identity_provider }}
              service_account: ${{ inputs.service_account }}

        - name: Deploy to Cloud Run
          id: deploy
          uses: google-github-actions/deploy-cloudrun@v2
          with:
              service: ${{ inputs.service }}
              image: us-east1-docker.pkg.dev/${{ inputs.project_id }}/grantflow/${{ inputs.service }}:${{ inputs.image_tag }}
              region: ${{ inputs.region }}
              project_id: ${{ inputs.project_id }}
              no_traffic: true
              labels: |
                  commit-sha=${{ github.sha }}
                  deployed-by=github-actions
                  environment=${{ inputs.environment }}
              env_vars: |
                  DEPLOYMENT_TIMESTAMP=${{ github.run_id }}

        - name: Get revision name
          id: get-revision
          shell: bash
          run: |
              # Get the latest revision name
              REVISION=$(gcloud run revisions list \
                --service=${{ inputs.service }} \
                --region=${{ inputs.region }} \
                --project=${{ inputs.project_id }} \
                --format='value(name)' \
                --limit=1)
              
              echo "revision=${REVISION}" >> $GITHUB_OUTPUT

        - name: Health check
          id: health
          shell: bash
          run: |
              echo "Performing health check for ${{ inputs.service }}..."
              
              if [ "${{ inputs.service }}" == "backend" ]; then
                # Backend has a public health endpoint
                HEALTH_URL="${{ steps.deploy.outputs.url }}/health"
                echo "Checking ${HEALTH_URL}..."
                
                for i in {1..5}; do
                  if curl -f "${HEALTH_URL}" --max-time 10 2>/dev/null; then
                    echo "Health check passed!"
                    echo "healthy=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  echo "Attempt $i failed, retrying..."
                  sleep 5
                done
                
                echo "Health check failed after 5 attempts"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1
              else
                # Other services require authentication, just check if revision is ready
                echo "Checking revision status..."
                
                for i in {1..10}; do
                  STATUS=$(gcloud run revisions describe ${{ steps.get-revision.outputs.revision }} \
                    --region=${{ inputs.region }} \
                    --project=${{ inputs.project_id }} \
                    --format='value(status.conditions[0].status)')
                  
                  if [ "${STATUS}" == "True" ]; then
                    echo "Revision is ready!"
                    echo "healthy=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  
                  echo "Revision status: ${STATUS}, waiting..."
                  sleep 10
                done
                
                echo "Revision failed to become ready"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1
              fi

        - name: Route traffic
          if: steps.health.outputs.healthy == 'true'
          shell: bash
          run: |
              echo "Routing traffic to new revision..."
              
              gcloud run services update-traffic ${{ inputs.service }} \
                --to-latest \
                --region ${{ inputs.region }} \
                --project ${{ inputs.project_id }}
              
              echo "✅ Successfully deployed ${{ inputs.service }} to ${{ inputs.environment }}"

        - name: Rollback on failure
          if: failure() && steps.get-revision.outputs.revision != ''
          shell: bash
          run: |
              echo "⚠️ Rolling back ${{ inputs.service }}..."
              
              # Get the previous revision
              PREVIOUS=$(gcloud run revisions list \
                --service=${{ inputs.service }} \
                --region=${{ inputs.region }} \
                --project=${{ inputs.project_id }} \
                --format='value(name)' \
                --limit=2 | tail -1)
              
              if [ -n "${PREVIOUS}" ]; then
                gcloud run services update-traffic ${{ inputs.service }} \
                  --to-revisions=${PREVIOUS}=100 \
                  --region ${{ inputs.region }} \
                  --project ${{ inputs.project_id }}
                
                echo "Rolled back to revision: ${PREVIOUS}"
              fi