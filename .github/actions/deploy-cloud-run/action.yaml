name: "Deploy to Cloud Run"
description: "Deploy a service to Cloud Run with health checks and zero-downtime deployment"

inputs:
    service:
        description: "Service name (backend, crawler, indexer, rag, scraper)"
        required: true
    image_tag:
        description: "Docker image tag to deploy"
        required: true
    environment:
        description: "Environment (staging, production)"
        required: true
        default: "staging"
    project_id:
        description: "GCP project ID"
        required: true
        default: "grantflow"
    region:
        description: "GCP region"
        required: true
        default: "us-central1"

outputs:
    service_url:
        description: "Cloud Run service URL"
        value: ${{ steps.deploy.outputs.service_url }}
    revision:
        description: "Deployed revision name"
        value: ${{ steps.deploy.outputs.revision }}

runs:
    using: "composite"
    steps:
        - name: Deploy to Cloud Run
          id: deploy
          shell: bash
          run: |
              echo "Deploying ${{ inputs.service }} to ${{ inputs.environment }}..."
              
              # Construct image URL
              IMAGE="us-east1-docker.pkg.dev/${{ inputs.project_id }}/grantflow/${{ inputs.service }}:${{ inputs.image_tag }}"
              
              # Deploy with zero downtime using --no-traffic flag
              gcloud run deploy ${{ inputs.service }} \
                --image "${IMAGE}" \
                --region ${{ inputs.region }} \
                --project ${{ inputs.project_id }} \
                --no-traffic \
                --update-labels "commit-sha=$(echo ${{ github.sha }} | cut -c1-7),deployed-by=github-actions,environment=${{ inputs.environment }}" \
                --update-env-vars "DEPLOYMENT_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              
              # Get the new revision name
              REVISION=$(gcloud run revisions list \
                --service=${{ inputs.service }} \
                --region=${{ inputs.region }} \
                --project=${{ inputs.project_id }} \
                --format='value(name)' \
                --limit=1)
              
              echo "revision=${REVISION}" >> $GITHUB_OUTPUT
              
              # Get service URL
              SERVICE_URL=$(gcloud run services describe ${{ inputs.service }} \
                --region=${{ inputs.region }} \
                --project=${{ inputs.project_id }} \
                --format='value(status.url)')
              
              echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT

        - name: Health check
          id: health
          shell: bash
          run: |
              echo "Performing health check for ${{ inputs.service }}..."
              
              if [ "${{ inputs.service }}" == "backend" ]; then
                # Backend has a public health endpoint
                HEALTH_URL="${{ steps.deploy.outputs.service_url }}/health"
                echo "Checking ${HEALTH_URL}..."
                
                for i in {1..5}; do
                  if curl -f "${HEALTH_URL}" --max-time 10 2>/dev/null; then
                    echo "Health check passed!"
                    echo "healthy=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  echo "Attempt $i failed, retrying..."
                  sleep 5
                done
                
                echo "Health check failed after 5 attempts"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1
              else
                # Other services require authentication, just check if revision is ready
                echo "Checking revision status..."
                
                for i in {1..10}; do
                  STATUS=$(gcloud run revisions describe ${{ steps.deploy.outputs.revision }} \
                    --service=${{ inputs.service }} \
                    --region=${{ inputs.region }} \
                    --project=${{ inputs.project_id }} \
                    --format='value(status.conditions[0].status)')
                  
                  if [ "${STATUS}" == "True" ]; then
                    echo "Revision is ready!"
                    echo "healthy=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  
                  echo "Revision status: ${STATUS}, waiting..."
                  sleep 10
                done
                
                echo "Revision failed to become ready"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1
              fi

        - name: Route traffic
          if: steps.health.outputs.healthy == 'true'
          shell: bash
          run: |
              echo "Routing traffic to new revision..."
              
              gcloud run services update-traffic ${{ inputs.service }} \
                --to-latest \
                --region ${{ inputs.region }} \
                --project ${{ inputs.project_id }}
              
              echo "✅ Successfully deployed ${{ inputs.service }} to ${{ inputs.environment }}"

        - name: Rollback on failure
          if: failure() && steps.deploy.outputs.revision != ''
          shell: bash
          run: |
              echo "⚠️ Rolling back ${{ inputs.service }}..."
              
              # Get the previous revision
              PREVIOUS=$(gcloud run revisions list \
                --service=${{ inputs.service }} \
                --region=${{ inputs.region }} \
                --project=${{ inputs.project_id }} \
                --format='value(name)' \
                --limit=2 | tail -1)
              
              if [ -n "${PREVIOUS}" ]; then
                gcloud run services update-traffic ${{ inputs.service }} \
                  --to-revisions=${PREVIOUS}=100 \
                  --region ${{ inputs.region }} \
                  --project ${{ inputs.project_id }}
                
                echo "Rolled back to revision: ${PREVIOUS}"
              fi