name: "Setup Node.js Package"
description: "Set up Node.js with pnpm for a specific package in monorepo"

inputs:
  package:
    description: "Package to work with (frontend, editor, crdt)"
    required: true
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        package_json_file: ${{ inputs.package }}/package.json
        run_install: false

    - name: Setup Node.js with pnpm cache
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: |
          pnpm-lock.yaml
          ${{ inputs.package }}/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: |
        pnpm install
        cd ${{ inputs.package }} && pnpm install

    - name: Build Editor (if frontend depends on it)
      if: inputs.package == 'frontend'
      shell: bash
      run: cd editor && pnpm build
