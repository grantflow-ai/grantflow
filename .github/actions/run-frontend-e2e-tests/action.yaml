name: "Run Frontend E2E Tests"
description: "Set up environment and run E2E tests for the frontend"

inputs:
    timeout:
        description: "Test timeout in seconds"
        required: false
        default: "300"

runs:
    using: "composite"
    steps:
        - name: Setup Node.js workspace
          uses: ./.github/actions/setup-node-workspace
          with:
              package: frontend
              node-version: "22"

        - name: Install Playwright browsers
          shell: bash
          run: cd frontend && pnpm exec playwright install --with-deps

        - name: Run E2E Tests
          shell: bash
          run: cd frontend && pnpm run test:e2e

        - name: Upload test results
          if: always()
          uses: actions/upload-artifact@v4
          with:
              name: frontend-e2e-test-results
              path: |
                  frontend/test-results/
                  frontend/playwright-report/
              retention-days: 7

        - name: Upload Playwright report
          if: always()
          uses: actions/upload-artifact@v4
          with:
              name: frontend-playwright-report
              path: frontend/playwright-report/
              retention-days: 7