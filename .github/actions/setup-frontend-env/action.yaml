name: "Setup Frontend Environment"
description: "Set up common environment variables for frontend testing and building"

inputs:
  environment:
    description: "Environment type (test, staging, production)"
    required: false
    default: "test"
  port:
    description: "Port number for NEXT_PUBLIC_SITE_URL"
    required: false
    default: "3000"

runs:
  using: "composite"
  steps:
    - name: Set environment variables
      shell: bash
      run: |
        # Common environment variables
        echo "NEXT_PUBLIC_SITE_URL=http://localhost:${{ inputs.port }}" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_API_KEY=mock-api-key" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_APP_ID=mock-app-id" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=mock-auth-domain" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=mock-measurement-id" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID=mock-sender-id" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID=mock-tenant-id" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=mock-project-id" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=mock-storage-bucket" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_BACKEND_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_MAILGUN_API_KEY=mock-mailgun-key" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_SEGMENT_WRITE_KEY=mock-segment-key" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_DEBUG=true" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_CRDT_SERVER_URL=ws://127.0.0.1:1234" >> $GITHUB_ENV
        echo "RESEND_API_KEY=mock-resend-api-key" >> $GITHUB_ENV

        # Environment-specific variables
        if [[ "${{ inputs.environment }}" == "e2e" ]]; then
          echo "NEXT_PUBLIC_MOCK_API=true" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MOCK_AUTH=true" >> $GITHUB_ENV
        fi