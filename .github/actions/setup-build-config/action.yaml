name: "Setup Build Configuration"
description: "Set image tags and environment configuration for build workflows"

outputs:
  image_tag:
    description: "Docker image tag based on branch/event"
    value: ${{ steps.config.outputs.image_tag }}
  environment:
    description: "Environment (staging or production)"
    value: ${{ steps.config.outputs.environment }}
  project_id:
    description: "GCP project ID"
    value: ${{ steps.config.outputs.project_id }}

runs:
  using: "composite"
  steps:
    - name: Set image tag and environment
      id: config
      shell: bash
      run: |
        # Set image tag based on event/branch
        if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "image_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        else
            echo "image_tag=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

        # Set environment and project based on branch
        if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "project_id=grantflow" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
        else
            echo "project_id=grantflow" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
        fi