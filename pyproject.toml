[project]
name = "backend-functions"
version = "0.1.0"
description = "Azure Functions"
authors = [{ name = "Na'aman Hirschfeld", email = "nhirschfeld@gmail.com" }]
requires-python = "==3.11.*"
readme = "README.md"
license = { text = "UNLICENSED" }

dependencies = [
    "aiohttp>=3.10.10",
    "anyio>=4.6.2.post1",
    "asyncpg>=0.30.0",
    "en-core-web-sm @ https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl",
    "greenlet>=3.1.1",
    "inflection>=0.5.1",
    "msgspec>=0.18.6",
    "semantic-text-splitter>=0.18.0",
    "spacy>=3.8.2",
    "sqlalchemy>=2.0.36",
    "tenacity>=8.3.0",
    "tiktoken>=0.8.0",
    "google-cloud-aiplatform>=1.73.0",
    "pypandoc-binary>=1.14",
    "google-cloud-documentai>=3.0.1",
    "sanic>=24.6.0",
    "google-cloud-storage>=2.18.2",
    "pgvector>=0.3.6",
    "python-dotenv>=1.0.1",
]

[tool.pdm]
distribution = false

[tool.pdm.scripts]
setup = { composite = [
    "pre-commit install --install-hooks",
    "pre-commit install --hook-type commit-msg",
    "pdm install",
] }
start.cmd = "func start"
lint.cmd = "pre-commit run --all-files"
test.cmd = "pytest"
test.env = { "PYTHONPATH" = "." }
coverage.cmd = "pytest --disable-warnings --cov --cov-report xml"
coverage.env = { "PYTHONPATH" = "." }

# linters configuration below
[tool.ruff]
line-length = 120
target-version = "py311"
lint.select = ["ALL"]
lint.ignore = [
    "ANN401",  # Dynamically typed ANY
    "COM812",  # Conflicts with formatter
    "D100",    # Missing docstring in public module
    "D104",    # Missing docstring in public package
    "D107",    # Missing docstring in __init__
    "D205",    # 1 blank line required between summary line and description
    "E501",    # Line too long, handled by ruff format
    "EM",      # Exception messages,
    "FBT001",  # Boolean-typed positional argument in function definition
    "FIX",     # We allow todo and fixme comments
    "ISC001",  # Conflicts with formatter
    "PGH003",  # Required specific mypy ignores
    "PLR2004", # Magic variables, we allow them
    "TD",      # We allow todo and fixme comments
    "TRY",     # Try except block, rules are too strict
]
src = ["src", "tests"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.*" = ["S", "D", "PT006", "PT007", "PT013"]

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 120

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]

[tool.ruff.lint.pylint]
max-args = 12
max-returns= 10

[tool.mypy]
packages = ["src", "tests"]
python_version = "3.11"
plugins = ["pydantic.mypy"]
disable_error_code = 'import-untyped'
implicit_reexport = false
show_error_codes = true
strict = true

[tool.coverage.run]
omit = ["tests/*"]
plugins = ["covdefaults"]
source = ["src"]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
fail_under = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[dependency-groups]
dev = [
    "covdefaults>=2.3.0",
    "faker>=24.11.0",
    "mypy>=1.10.0",
    "polyfactory>=2.16.2",
    "pre-commit>=3.7.0",
    "pytest-asyncio>=0.23.6",
    "pytest-cov>=5.0.0",
    "pytest-logger>=1.1.1",
    "pytest-mock>=3.14.0",
    "pytest>=8.1.1",
    "ruff>=0.4.0"
]
