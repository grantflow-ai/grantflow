[project]
name = "grantflow-backend"
version = "0.1.0"
description = "GrantFlow Backend"
authors = [{ name = "Na'aman Hirschfeld", email = "nhirschfeld@gmail.com" }]
requires-python = "==3.12.*"
readme = "README.md"
license = { text = "UNLICENSED" }

dependencies = [
    "aiohttp>=3.11.11",
    "anyio>=4.8.0",
    "asyncpg>=0.30.0",
    "azure-ai-documentintelligence>=1.0.0",
    "crawl4ai>=0.4.247",
    "en-core-web-sm",
    "firebase-admin>=6.6.0",
    "google-cloud-aiplatform>=1.75.0",
    "greenlet>=3.1.1",
    "jsonschema>=4.23.0",
    "msgspec>=0.19.0",
    "pathvalidate>=3.2.3",
    "pgvector>=0.3.6",
    "pyjwt>=2.10.1",
    "pypandoc>=1.14",
    "sanic[ext]>=24.12.0",
    "semantic-text-splitter>=0.20.1",
    "spacy>=3.8.3",
    "sqlalchemy>=2.0.36",
    "structlog>=24.4.0",
    "tenacity>=9.0.0",
    "uvicorn>=0.34.0",
]

[dependency-groups]
dev = [
    "atlas-provider-sqlalchemy>=0.2.4",
    "covdefaults>=2.3.0",
    "faker>=33.3.0",
    "mypy>=1.14.1",
    "polyfactory>=2.18.1",
    "pre-commit>=4.0.1",
    "pytest>=8.3.4",
    "pytest-asyncio>=0.25.1",
    "pytest-cov>=6.0.0",
    "pytest-logger>=1.1.1",
    "pytest-mock>=3.14.0",
    "pytest-timeout>=2.3.1",
    "python-dotenv>=1.0.1",
    "ruff>=0.8.6",
    "sanic-testing>=24.6.0",
    "testcontainers>=4.9.0",
]

[tool.uv.sources]
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }

# linters configuration below
[tool.ruff]
line-length = 120
target-version = "py312"
lint.select = ["ALL"]
lint.ignore = [
    "ANN401",   # Dynamically typed ANY
    "ASYNC110", # Use Event instead of sleep in async loop
    "COM812",   # Conflicts with formatter
    "D100",     # Missing docstring in public module
    "D104",     # Missing docstring in public package
    "D107",     # Missing docstring in __init__
    "D205",     # 1 blank line required between summary line and description
    "E501",     # Line too long, handled by ruff format
    "EM",       # Exception messages,
    "FBT",      # Boolean-typed positional argument in function definition
    "FIX",      # We allow todo and fixme comments
    "ISC001",   # Conflicts with formatter
    "PD011",    # Creates false positives
    "PGH003",   # Required specific mypy ignores
    "PLR2004",  # Magic variables, we allow them
    "S104",     # Disallows using '0.0.0.0' as a host
    "TD",       # We allow todo and fixme comments
    "TRY",      # Try except block, rules are too strict
]
src = ["src", "tests"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.*" = ["S", "D", "PT006", "PT007", "PT013", "ARG001", "RUF012", "N815"]

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 120

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]

[tool.ruff.lint.pylint]
max-args = 12
max-returns= 10

[tool.mypy]
packages = ["src", "tests"]
python_version = "3.12"
plugins = []
disable_error_code = 'import-untyped'
implicit_reexport = false
show_error_codes = true
strict = true

[tool.coverage.run]
omit = ["tests/*"]
plugins = ["covdefaults"]
source = ["src"]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
fail_under = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
