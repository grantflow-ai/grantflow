# Test settings
test_settings:
  scientific_query: "CAR-T cell therapy melanoma brain metastases CD8+ T cells immunosuppression"
  timeout: 900
  query_count: 3
  search_k: 10
  
# Benchmark settings
benchmark_settings:
  insertion_batch_size: 1000
  search_iterations: 3
  warm_up_runs: 0