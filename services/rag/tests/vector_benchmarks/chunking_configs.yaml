# Chunking Strategy Benchmark Configurations
# 
# This file defines all the chunking and embedding combinations to test.
# Add new configurations here without modifying test code.

configurations:
  minilm_2000:
    description: "MiniLM with large chunks"
    chunking:
      max_chars: 2000
      overlap: 200
    embedding:
      model: "sentence-transformers/all-MiniLM-L12-v2"
      dimension: 384

  scibert_2000:
    description: "SciBERT with large chunks"
    chunking:
      max_chars: 2000
      overlap: 200
    embedding:
      model: "allenai/scibert_scivocab_uncased"
      dimension: 768
    
  mpnet_2000:
    description: "MPNet with large chunks"
    chunking:
      max_chars: 2000
      overlap: 200
    embedding:
      model: "sentence-transformers/all-mpnet-base-v2"
      dimension: 768

# Test settings
test_settings:
  scientific_query: "CAR-T cell therapy melanoma brain metastases CD8+ T cells immunosuppression"
  timeout: 900
  query_count: 5
  search_k: 10
  
# Benchmark settings
benchmark_settings:
  insertion_batch_size: 1000
  search_iterations: 3
  warm_up_runs: 0