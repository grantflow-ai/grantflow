[project]
name = "backend"
version = "0.1.0"
description = "GrantFlow Backend"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [ { name = "Na'aman Hirschfeld", email = "admin@grantflow.ai" } ]
requires-python = "==3.12.*"
classifiers = [ "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.12" ]

dependencies = [
  "aiohttp>=3.11.14",
  "db",
  "firebase-admin>=6.7",
  "pyjwt>=2.10.1",
  "shared-utils[ai,embeddings,gcs,nlp,pubsub]",
  "uvicorn[standard]>=0.34",
]

[dependency-groups]
dev = [
  "shared-utils[ai,chunking,embeddings,extraction,gcs,nlp]",
]

[tool.codespell]
skip = "frontend/src/components/onboarding/icons.tsx"
