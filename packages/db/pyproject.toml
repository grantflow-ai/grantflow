[build-system]
build-backend = "hatchling.build"

requires = [ "hatchling" ]

[project]
name = "db"
version = "0.1.0"
description = "Shared database models and migrations"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [ { name = "Na'aman Hirschfeld", email = "admin@grantflow.ai" } ]
requires-python = "==3.13.*"
classifiers = [ "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.13" ]
dependencies = [
  "asyncpg>=0.31",
  "greenlet>=3.3",
  "pgvector>=0.4.2",
  "shared-utils",
  "sqlalchemy>=2.0.45",
]

[dependency-groups]
dev = [
  "alembic>=1.18",
  "kreuzberg>=3.22",        # for type hints
  "psycopg[binary]>=3.3.2", # required for alembic
]

[tool.hatch.build.targets.wheel]
packages = [ "src" ]

[tool.hatch.build.targets.sdist]
packages = [ "src" ]
