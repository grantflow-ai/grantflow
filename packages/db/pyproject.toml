[build-system]
build-backend = "hatchling.build"

requires = [ "hatchling" ]

[project]
name = "db"
version = "0.1.0"
description = "Shared database models and migrations"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [ { name = "Na'aman Hirschfeld", email = "admin@grantflow.ai" } ]
requires-python = "==3.12.*"
classifiers = [ "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.12" ]
dependencies = [
  "anthropic>=0.49",
  "asyncpg>=0.30",
  "greenlet>=3.1.1",
  "pgvector>=0.4",
  "shared-utils",
  "sqlalchemy>=2.0.39",
]

[dependency-groups]
dev = [
  "alembic>=1.15.1",
  "psycopg[binary]>=3.2.6", # required for alembic
]

[tool.hatch.build.targets.wheel]
packages = [ "src" ]

[tool.hatch.build.targets.sdist]
packages = [ "src" ]
