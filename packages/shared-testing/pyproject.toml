[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "shared-testing"
version = "0.1.0"
description = "Testing infrastructure for the grantflow monorepo"
readme = "README.md"
requires-python = ">=3.13"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "faker>=37.0.1",
  "pytest>=8.3.5",
  "pytest-asyncio>=0.25.3",
  "pytest-cov>=6",
  "pytest-mock>=3.14",
  "pytest-timeout>=2.3.1",
  "pytest-xdist>=3.8",
]

optional-dependencies.all = [
  "shared-testing[db,evaluation,firebase,gcs,performance,playwright,pubsub,rag,scenarios]",
]
optional-dependencies.db = [
  "alembic>=1.15.1,<2",
  "asyncpg>=0.31",
  "sqlalchemy>=2.0.39,<3",
  "testcontainers[postgres]>=4.13.2",
]
optional-dependencies.evaluation = [
  "anthropic>=0.40",
  "scikit-learn>=1.6.1",
  "textstat>=0.7.10",
  "transformers>=4.49",
]
optional-dependencies.firebase = [
  "firebase-admin>=7",
]
optional-dependencies.gcs = [
  "google-cloud-storage>=2.19",
  "testcontainers>=4.13.2",
]
optional-dependencies.performance = [
  "psutil>=6.1.1",
]
optional-dependencies.playwright = [
  "playwright>=1.45",
]
optional-dependencies.pubsub = [
  "google-cloud-pubsub>=2.26.1",
]
optional-dependencies.rag = [
  "numpy>=2.2.2",
  "pgvector>=0.4.1",
  "polyfactory>=3.1",
]
optional-dependencies.scenarios = [
  "pyyaml>=6.0.2",
]

[tool.hatch.build.targets.wheel]
packages = [ "src/shared_testing" ]
