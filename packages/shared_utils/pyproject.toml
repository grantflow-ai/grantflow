[build-system]
build-backend = "hatchling.build"

requires = [ "hatchling" ]

[project]
name = "shared-utils"
version = "0.1.0"
description = "Shared utilities for GrantFlow"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [ { name = "Na'aman Hirschfeld", email = "admin@grantflow.ai" } ]
requires-python = "==3.12.*"
classifiers = [ "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.12" ]

dependencies = [
  "anyio>=4.9",
  "litestar>=2.15.1",
  "msgspec>=0.19",
  "structlog>=25.2",
  "tenacity>=9",
]

optional-dependencies.ai = [
  "anthropic>=0.49",
  "google-cloud-aiplatform>=1.85",
  "prompt-template>=1.2",
]
optional-dependencies.chunking = [
  "semantic-text-splitter>=0.24.2",
]
optional-dependencies.embeddings = [
  "sentence-transformers[onnx]>=3.4.1",
]
optional-dependencies.extraction = [
  "kreuzberg>=2.1.2",
]
optional-dependencies.gcs = [
  "google-cloud-storage>=2.19",
]
optional-dependencies.nlp = [
  "en-core-web-sm",
  "rank-bm25>=0.2.2",
  "spacy>=3.8.4",
  "torch>=2.2.2",
]
optional-dependencies.pubsub = [
  "google-cloud-pubsub>=2.29",
]

[tool.hatch.build.targets.wheel]
packages = [ "src" ]

[tool.hatch.build.targets.sdist]
packages = [ "src" ]

[tool.uv.sources]
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }
