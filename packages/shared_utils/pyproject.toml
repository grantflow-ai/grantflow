[build-system]
build-backend = "hatchling.build"

requires = [ "hatchling" ]

[project]
name = "shared-utils"
version = "0.1.0"
description = "Shared utilities for GrantFlow"
readme = "README.md"
license = { text = "UNLICENSED" }
authors = [ { name = "Na'aman Hirschfeld", email = "admin@grantflow.ai" } ]
requires-python = "==3.13.*"
classifiers = [ "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.13" ]

dependencies = [
  "anyio>=4.12.1",
  "msgspec>=0.20",
  "structlog>=25.2",
  "tenacity>=9",
]

optional-dependencies.ai = [
  "anthropic>=0.75",
  "google-genai>=1.57",
  "prompt-template>=1.2",
]
# Chunking now handled by Kreuzberg natively - no separate dependency needed
optional-dependencies.embeddings = [
  "sentence-transformers[onnx]>=5.2",
]
optional-dependencies.extraction = [
  "en-core-web-sm",
  "kreuzberg[chunking,document-classification,entity-extraction,langdetect]>=3.22",
]
optional-dependencies.gcs = [
  "google-cloud-storage>=3.7",
]
optional-dependencies.nlp = [
  "en-core-web-sm",
  "rank-bm25>=0.2.2",
  "spacy>=3.8.7",
  "torch>=2.7.1",
]
optional-dependencies.pubsub = [
  "google-cloud-pubsub>=2.34",
]

optional-dependencies.server = [
  "litestar[opentelemetry]>=2.19",
  "opentelemetry-exporter-gcp-monitoring>=1.6",
  "opentelemetry-exporter-gcp-trace>=1.6",
  "opentelemetry-instrumentation-httpx>=0.60b1",
  "opentelemetry-instrumentation-sqlalchemy>=0.60b1",
  "uvicorn[standard]>=0.40",
]

[dependency-groups]
dev = [
  "db",
]

[tool.hatch.build.targets.wheel]
packages = [ "src" ]

[tool.hatch.build.targets.sdist]
packages = [ "src" ]

[tool.uv.sources]
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }

[tool.ruff]
lint.ignore = [ "PLC0415" ]
