skip_output:
    - meta
    - summary

pre-commit:
    parallel: false
    commands:
        biome:
            glob: "{frontend,editor}/**/*.{js,jsx,ts,tsx,mjs,mts,json,jsonc,css}"
            run: |
                # Process frontend files
                frontend_files=""
                editor_files=""
                for file in {staged_files}; do
                    case "$file" in
                        frontend/*)
                            frontend_files="$frontend_files ${file#frontend/}"
                            ;;
                        editor/*)
                            editor_files="$editor_files ${file#editor/}"
                            ;;
                    esac
                done
                
                if [ -n "$frontend_files" ]; then
                    (cd frontend && pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true $frontend_files)
                fi
                
                if [ -n "$editor_files" ]; then
                    (cd editor && pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true $editor_files)
                fi
            stage_fixed: true

        eslint:
            glob: "{frontend,editor}/**/*.{js,jsx,ts,tsx,mjs,mts}"
            run: |
                # Process frontend files
                frontend_files=""
                editor_files=""
                for file in {staged_files}; do
                    case "$file" in
                        frontend/*)
                            frontend_files="$frontend_files ${file#frontend/}"
                            ;;
                        editor/*)
                            editor_files="$editor_files ${file#editor/}"
                            ;;
                    esac
                done
                
                if [ -n "$frontend_files" ]; then
                    (cd frontend && pnpm eslint --fix --max-warnings=0 --no-warn-ignored --cache $frontend_files)
                fi
                
                if [ -n "$editor_files" ]; then
                    (cd editor && pnpm eslint --fix --max-warnings=0 --no-warn-ignored --cache $editor_files)
                fi
            stage_fixed: true

        typescript:
            glob: "{frontend,editor}/**/*.{ts,tsx,mts}"
            run: |
                # Check if we have files in each directory
                has_frontend=false
                has_editor=false
                for file in {staged_files}; do
                    case "$file" in
                        frontend/*) has_frontend=true ;;
                        editor/*) has_editor=true ;;
                    esac
                done
                
                # Run TypeScript checks concurrently if files exist
                if [ "$has_frontend" = true ] && [ "$has_editor" = true ]; then
                    (cd frontend && pnpm tsc --noEmit --skipLibCheck) &
                    (cd editor && pnpm tsc --noEmit --skipLibCheck) &
                    wait
                elif [ "$has_frontend" = true ]; then
                    (cd frontend && pnpm tsc --noEmit --skipLibCheck)
                elif [ "$has_editor" = true ]; then
                    (cd editor && pnpm tsc --noEmit --skipLibCheck)
                fi
            exclude: "frontend/src/types/api-types.ts"

        ruff:
            glob: "*.py"
            run: uv run ruff check --fix --unsafe-fixes {staged_files} && uv run ruff format {staged_files}
            stage_fixed: true

        mypy:
            glob: "*.py"
            run: uv run mypy {staged_files}


        ai-rulez:
            glob: "**/ai-rulez.yaml"
            run: uvx ai-rulez generate --recursive
            stage_fixed: true

        codespell:
            glob: "*.{py,ts,tsx,js,jsx,yaml,yml,md,txt,sh}"
            exclude: |
                packages/*/tests/**/*
                services/*/tests/**/*
                testing/test_data/**/*
                test_data/**/*
                pnpm-lock.yaml
                *.spec.ts
                *.spec.tsx
                *_test.py
            run: uv run codespell {staged_files} --skip="services/rag/**/*"

        pyproject-fmt:
            glob: "*pyproject.toml"
            run: uv run pyproject-fmt {staged_files}
            stage_fixed: true

        check-yaml:
            glob: "*.{yaml,yml}"
            run: |
                failed_files=""
                for file in {staged_files}; do
                  if ! uv run python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
                    echo "❌ YAML syntax error in: $file"
                    failed_files="$failed_files $file"
                  fi
                done
                if [ -n "$failed_files" ]; then
                  echo "YAML validation failed for:$failed_files"
                  exit 1
                fi

        check-toml:
            glob: "*.toml"
            run: |
                failed_files=""
                for file in {staged_files}; do
                  if ! uv run python -c "import tomllib; tomllib.load(open('$file', 'rb'))" 2>/dev/null; then
                    echo "❌ TOML syntax error in: $file"
                    failed_files="$failed_files $file"
                  fi
                done
                if [ -n "$failed_files" ]; then
                  echo "TOML validation failed for:$failed_files"
                  exit 1
                fi

        check-json:
            glob: "*.json"
            run: |
                failed_files=""
                for file in {staged_files}; do
                  if ! uv run python -m json.tool "$file" > /dev/null 2>&1; then
                    echo "❌ JSON syntax error in: $file"
                    failed_files="$failed_files $file"
                  fi
                done
                if [ -n "$failed_files" ]; then
                  echo "JSON validation failed for:$failed_files"
                  exit 1
                fi

        check-case-conflict:
            run: |
                echo "{staged_files}" | tr ' ' '\n' | sort -f | uniq -i -d | grep -q . && {
                  echo "Error: Case conflict detected in file names"
                  exit 1
                } || exit 0

        name-tests-test:
            glob: "{packages,services}/*/tests/**/*.py"
            exclude: "completion|utils|test_utils|factories"
            run: |
                renamed_files=""
                for file in {staged_files}; do
                  basename=$(basename "$file")
                  dir=$(dirname "$file")

                  # Skip __init__.py files and other special files
                  case "$basename" in
                    __init__.py|conftest.py|*_utils.py|*_helpers.py|*_fixtures.py) continue ;;
                  esac

                  # Check if file starts with test_ and needs renaming
                  case "$basename" in
                    test_*.py)
                      # Extract the part after test_
                      name_without_test="${basename#test_}"
                      # Remove .py extension
                      name_without_ext="${name_without_test%.py}"
                      # Create new name ending with _test.py
                      new_name="${name_without_ext}_test.py"
                      new_path="$dir/$new_name"

                      echo "Renaming test file: $file -> $new_path"
                      git mv "$file" "$new_path"
                      renamed_files="$renamed_files $new_path"
                      ;;
                  esac
                done

                # If we renamed any files, stage them
                if [ -n "$renamed_files" ]; then
                  git add $renamed_files
                fi
            stage_fixed: true

        tofu-fmt:
            only:
                - glob: "terraform/**/*.tf"
            run: |
                # Format each file individually
                for file in {staged_files}; do
                    tofu fmt -write=true "$file"
                done
            stage_fixed: true

        tofu-validate:
            only:
                - glob: "terraform/**/*.tf"
            run: cd terraform && tofu init -backend=false && tofu validate

        tflint:
            only:
                - glob: "terraform/**/*.tf"
            run: tflint --chdir=terraform

commit-msg:
    commands:
        commitlint:
            run: |
                if command -v commitlint >/dev/null 2>&1; then
                    commitlint --edit {1}
                else
                    npm install -g @commitlint/cli @commitlint/config-conventional
                    commitlint --edit {1}
                fi