skip_output:
    - meta
    - summary

pre-commit:
    parallel: false
    commands:
        biome:
            glob: "frontend/**/*.{js,jsx,ts,tsx,mjs,mts,json,jsonc,css}"
            run: |
                # Convert absolute paths to relative paths from frontend directory
                relative_files=""
                for file in {staged_files}; do
                    relative_files="$relative_files ${file#frontend/}"
                done
                cd frontend && pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true $relative_files
            stage_fixed: true

        eslint:
            glob: "frontend/**/*.{js,jsx,ts,tsx,mjs,mts}"
            run: |
                # Convert absolute paths to relative paths from frontend directory
                relative_files=""
                for file in {staged_files}; do
                    relative_files="$relative_files ${file#frontend/}"
                done
                cd frontend && pnpm eslint --fix --max-warnings=0 --no-warn-ignored --cache $relative_files
            stage_fixed: true

        typescript:
            glob: "frontend/**/*.{ts,tsx,mts}"
            run: cd frontend && pnpm tsc --noEmit --skipLibCheck
            exclude: "frontend/src/types/api-types.ts"

        ruff:
            glob: "*.py"
            run: uv run ruff check --fix --unsafe-fixes {staged_files} && uv run ruff format {staged_files}
            stage_fixed: true

        mypy:
            glob: "*.py"
            run: uv run mypy {staged_files}

        uncomment:
            glob: "*.py"
            run: uv run uncomment --remove-doc {staged_files}
            stage_fixed: true

        ai-rulez:
            glob: "**/ai-rulez.yaml"
            run: uv run ai-rulez generate --recursive
            stage_fixed: true

        codespell:
            glob: "*.{py,ts,tsx,js,jsx,yaml,yml,md,txt,sh}"
            exclude: |
                packages/*/tests/**/*
                services/*/tests/**/*
                testing/test_data/**/*
                test_data/**/*
                pnpm-lock.yaml
                *.spec.ts
                *.spec.tsx
                *_test.py
            run: uv run codespell {staged_files}

        pyproject-fmt:
            glob: "*pyproject.toml"
            run: uv run pyproject-fmt {staged_files}
            stage_fixed: true

        check-yaml:
            glob: "*.{yaml,yml}"
            run: |
                for file in {staged_files}; do
                  uv run python -c "import yaml; yaml.safe_load(open('$file'))"
                done

        check-toml:
            glob: "*.toml"
            run: |
                for file in {staged_files}; do
                  uv run python -c "import tomllib; tomllib.load(open('$file', 'rb'))"
                done

        check-json:
            glob: "*.json"
            run: |
                for file in {staged_files}; do
                  uv run python -m json.tool "$file" > /dev/null
                done

        check-case-conflict:
            run: |
                echo "{staged_files}" | tr ' ' '\n' | sort -f | uniq -i -d | grep -q . && {
                  echo "Error: Case conflict detected in file names"
                  exit 1
                } || exit 0

        name-tests-test:
            glob: "{packages,services}/*/tests/**/*.py"
            exclude: "completion|utils|test_utils|factories"
            run: |
                renamed_files=""
                for file in {staged_files}; do
                  basename=$(basename "$file")
                  dir=$(dirname "$file")

                  # Skip __init__.py files and other special files
                  case "$basename" in
                    __init__.py|conftest.py|*_utils.py|*_helpers.py|*_fixtures.py) continue ;;
                  esac

                  # Check if file starts with test_ and needs renaming
                  case "$basename" in
                    test_*.py)
                      # Extract the part after test_
                      name_without_test="${basename#test_}"
                      # Remove .py extension
                      name_without_ext="${name_without_test%.py}"
                      # Create new name ending with _test.py
                      new_name="${name_without_ext}_test.py"
                      new_path="$dir/$new_name"

                      echo "Renaming test file: $file -> $new_path"
                      git mv "$file" "$new_path"
                      renamed_files="$renamed_files $new_path"
                      ;;
                  esac
                done

                # If we renamed any files, stage them
                if [ -n "$renamed_files" ]; then
                  git add $renamed_files
                fi
            stage_fixed: true

        tofu-fmt:
            glob: "**/*.tf"
            run: tofu fmt -check=true {staged_files}
            stage_fixed: true

        tofu-validate:
            glob: "terraform/**/*.tf"
            run: |
                if echo "{staged_files}" | grep -q "\.tf"; then
                    cd terraform && tofu init -backend=false && tofu validate
                fi

        tflint:
            glob: "terraform/**/*.tf"
            run: |
                if echo "{staged_files}" | grep -q "\.tf"; then
                    tflint --chdir=terraform
                fi

commit-msg:
    commands:
        commitlint:
            run: |
                if command -v commitlint >/dev/null 2>&1; then
                    commitlint --edit {1}
                else
                    npm install -g @commitlint/cli @commitlint/config-conventional
                    commitlint --edit {1}
                fi