skip_output:
    - meta
    - summary

pre-commit:
    parallel: true
    commands:
        biome:
            glob: "frontend/**/*.{js,jsx,ts,tsx,mjs,mts,json,jsonc,css}"
            run: |
                # Convert absolute paths to relative paths from frontend directory
                relative_files=""
                for file in {staged_files}; do
                    relative_files="$relative_files ${file#frontend/}"
                done
                cd frontend && pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true $relative_files
            stage_fixed: true

        eslint:
            glob: "frontend/**/*.{js,jsx,ts,tsx,mjs,mts}"
            run: |
                # Convert absolute paths to relative paths from frontend directory
                relative_files=""
                for file in {staged_files}; do
                    relative_files="$relative_files ${file#frontend/}"
                done
                cd frontend && pnpm eslint --fix --max-warnings=0 --no-warn-ignored --cache $relative_files
            stage_fixed: true

        typescript:
            glob: "frontend/**/*.{ts,tsx,mts}"
            run: cd frontend && pnpm tsc --noEmit --skipLibCheck
            exclude: "frontend/src/types/api-types.ts"

        ruff:
            glob: "*.py"
            run: uv run ruff check --fix --unsafe-fixes {staged_files} && uv run ruff format {staged_files}
            stage_fixed: true

        mypy:
            glob: "*.py"
            run: uv run mypy {staged_files}

        uncomment:
            glob: "*.py"
            run: uv run uncomment --remove-doc {staged_files}
            stage_fixed: true

        ai-rulez:
            glob: "ai_rulez.yaml"
            run: uv run ai-rulez
            stage_fixed: true

        codespell:
            glob: "*.{py,ts,tsx,js,jsx,yaml,yml,md,txt,sh}"
            exclude: |
                packages/*/tests/**/*
                services/*/tests/**/*
                testing/test_data/**/*
                test_data/**/*
                pnpm-lock.yaml
            run: uv run codespell {staged_files}

        pyproject-fmt:
            glob: "*pyproject.toml"
            run: uv run pyproject-fmt {staged_files}
            stage_fixed: true

        trailing-whitespace:
            run: |
                for file in {staged_files}; do
                  if [ -f "$file" ]; then
                    python3 -c "import sys; content = open(sys.argv[1], 'r').read(); open(sys.argv[1], 'w').write('\\n'.join(line.rstrip() for line in content.splitlines()))" "$file"
                  fi
                done
            stage_fixed: true

        end-of-file-fixer:
            run: |
                for file in {staged_files}; do
                  if [ -f "$file" ] && [ -s "$file" ]; then
                    # Skip binary files
                    case "$file" in
                      *.png|*.jpg|*.jpeg|*.gif|*.svg|*.ico|*.webp|*.pdf|*.zip|*.tar|*.gz|*.bz2) continue ;;
                      testing/test_data/**/*) continue ;;
                      test_data/**/*) continue ;;
                      *node_modules*) continue ;;
                      *.lock) continue ;;
                    esac
                    # Check if file is missing final newline
                    if [ -n "$(tail -c 1 "$file")" ]; then
                      echo >> "$file"
                    fi
                  fi
                done
            stage_fixed: true

        check-yaml:
            glob: "*.{yaml,yml}"
            run: |
                for file in {staged_files}; do
                  python3 -c "import yaml; yaml.safe_load(open('$file'))"
                done

        check-toml:
            glob: "*.toml"
            run: |
                for file in {staged_files}; do
                  python3 -c "import tomllib; tomllib.load(open('$file', 'rb'))"
                done

        check-json:
            glob: "*.json"
            run: |
                for file in {staged_files}; do
                  python3 -m json.tool "$file" > /dev/null
                done

        check-case-conflict:
            run: |
                echo "{staged_files}" | tr ' ' '\n' | sort -f | uniq -i -d | grep -q . && {
                  echo "Error: Case conflict detected in file names"
                  exit 1
                } || exit 0

        name-tests-test:
            glob: "{packages,services}/*/tests/**/*.py"
            exclude: "completion|utils|test_utils|factories"
            run: |
                for file in {staged_files}; do
                  case "$file" in
                    *_test.py) ;;
                    *)
                      echo "Error: Test file '$file' does not follow naming convention (should end with '_test.py', not start with 'test_')"
                      exit 1
                      ;;
                  esac
                done

        tofu-fmt:
            glob: "**/*.tf"
            run: tofu fmt -check=true {staged_files}
            stage_fixed: true

        tofu-validate:
            glob: "terraform/**/*.tf"
            run: |
                case "{staged_files}" in
                  *\.tf*)
                    cd terraform && tofu init -backend=false && tofu validate
                    ;;
                esac

        tflint:
            glob: "terraform/**/*.tf"
            run: |
                case "{staged_files}" in
                  *\.tf*)
                    tflint --chdir=terraform
                    ;;
                esac

commit-msg:
    commands:
        commitlint:
            run: |
                if command -v commitlint >/dev/null 2>&1; then
                    commitlint --edit {1}
                else
                    npm install -g @commitlint/cli @commitlint/config-conventional
                    commitlint --edit {1}
                fi