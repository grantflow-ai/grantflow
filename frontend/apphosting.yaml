# Base configuration - serves as fallback
# Environment-specific configs in apphosting.staging.yaml and apphosting.production.yaml
runConfig:
    minInstances: 0
    maxInstances: 10
    cpu: 2
    memoryMiB: 1024
    concurrency: 100

env:
    - variable: NEXT_PUBLIC_SITE_URL
      secret: NEXT_PUBLIC_SITE_URL_PRODUCTION
    - variable: NEXT_PUBLIC_BACKEND_API_BASE_URL
      value: "http://localhost:8000"
    - variable: NEXT_PUBLIC_FIREBASE_API_KEY
      secret: NEXT_PUBLIC_FIREBASE_API_KEY_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_APP_ID
      secret: NEXT_PUBLIC_FIREBASE_APP_ID_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      secret: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID
      secret: NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID
      secret: NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID_PRODUCTION
    - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_PRODUCTION
    - variable: RESEND_API_KEY
      secret: RESEND_API_KEY_PRODUCTION
    - variable: NEXT_PUBLIC_MOCK_API
      secret: NEXT_PUBLIC_MOCK_API_PRODUCTION
    - variable: NEXT_PUBLIC_MOCK_AUTH
      secret: NEXT_PUBLIC_MOCK_AUTH_PRODUCTION
