runConfig:
    minInstances: 0
    maxInstances: 5
    cpu: 1
    memoryMiB: 512
    concurrency: 50

env:
    - variable: NEXT_PUBLIC_SITE_URL
      secret: NEXT_PUBLIC_SITE_URL_STAGING
    - variable: NEXT_PUBLIC_BACKEND_API_BASE_URL
      secret: NEXT_PUBLIC_BACKEND_API_BASE_URL_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_API_KEY
      secret: NEXT_PUBLIC_FIREBASE_API_KEY_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_APP_ID
      secret: NEXT_PUBLIC_FIREBASE_APP_ID_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      secret: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID
      secret: NEXT_PUBLIC_FIREBASE_MESSAGE_SENDER_ID_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID
      secret: NEXT_PUBLIC_FIREBASE_MICROSOFT_TENANT_ID_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID_STAGING
    - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_STAGING
    - variable: NEXT_PUBLIC_MAILGUN_API_KEY
      secret: NEXT_PUBLIC_MAILGUN_API_KEY_STAGING
    - variable: RESEND_API_KEY
      secret: RESEND_API_KEY_STAGING
    - variable: NEXT_PUBLIC_SEGMENT_WRITE_KEY
      secret: NEXT_PUBLIC_SEGMENT_WRITE_KEY_STAGING
    # Enable mock API and auth for staging by default
    - variable: NEXT_PUBLIC_MOCK_API
      value: "true"
    - variable: NEXT_PUBLIC_MOCK_AUTH
      value: "true"