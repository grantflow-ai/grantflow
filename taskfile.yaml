version: "3"

tasks:
    # Backend tasks
    backend:migrate:
        dir: backend
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run atlas migrate apply --env sqlalchemy

    backend:create-migration:
        dir: backend
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run atlas migrate diff --env sqlalchemy {{.CLI_ARGS}}

    backend:test:
        dir: backend
        cmds:
            - uv run python -m pytest {{.CLI_ARGS}}

    backend:install:
        cmds:
            - uv sync --all-packages --dev

    backend:update:
        cmds:
            - uv sync --upgrade --all-packages
            - uv run uv-bump --pyproject-toml ./pyproject.toml
            - uv run uv-bump --pyproject-toml ./backend/pyproject.toml
            - task: install-backend

    # Frontend tasks
    frontend:dev:
        dir: frontend
        cmds:
            - pnpm run dev

    frontend:build:
        dir: frontend
        cmds:
            - pnpm run build

    frontend:test:
        dir: frontend
        cmds:
            - pnpm test {{.CLI_ARGS}}

    frontend:install:
        dir: frontend
        cmds:
            - pnpm install

    frontend:update:
        dir: frontend
        cmds:
            - pnpm up --latest

    # Code Generation tasks
    backend:api-specs:
        cmds:
            - cd backend && uv run litestar --app src.api.main:app schema typescript
            - mv api-specs.ts ../frontend/src/types/api-types.ts
            - cd ..
            - task: lint

    # Monorepo tasks
    setup:
        desc: Setup the project dependencies
        cmds:
            - pre-commit install && pre-commit install --hook-type commit-msg && pre-commit install-hooks
            - task: frontend:install
            - task: backend:install

    update:
        desc: Update the project dependencies
        cmds:
            - task: frontend:update
            - task: backend:update
            - pre-commit autoupdate

    db:up:
        desc: Bring up the local database
        cmds:
            - docker compose stop && docker compose up db --detach

    db:down:
        desc: Tear down the local database
        cmds:
            - docker compose down db

    db:seed:
        dir: backend
        cmds:
            - task: db:up
            - sleep 2
            - uv run scripts/seed_db.py

    lint:
        desc: Lint the project
        cmds:
            - pre-commit run --show-diff-on-failure --color=always --all-files
