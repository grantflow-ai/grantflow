version: "3"

vars:
    FRONTEND_DIR: frontend
    SERVICES_DIR: services
    PACKAGES_DIR: packages

tasks:
    setup:
        desc: First-time setup - install all dependencies and pre-commit hooks
        cmds:
            - pre-commit install && pre-commit install --hook-type commit-msg && pre-commit install-hooks
            - task: frontend:install
            - task: backend:install
            - task: backend:install-playwright

    update:
        desc: Update all dependencies and pre-commit hooks
        cmds:
            - task: frontend:update
            - task: backend:update
            - pre-commit autoupdate

    lint:
        desc: Run all linters and formatters
        cmds:
            - pre-commit run --show-diff-on-failure --color=always --all-files

    # Backend service specific tasks
    backend:install:
        desc: Install backend dependencies using uv
        cmds:
            - uv sync --all-packages --dev

    backend:install-playwright:
        desc: Install Playwright dependencies
        cmds:
            - uv run playwright install

    backend:update:
        desc: Update backend dependencies to latest versions
        cmds:
            - uv sync --upgrade --all-packages
            - uv run uv-bump --pyproject-toml ./pyproject.toml
            - uv run uv-bump --pyproject-toml ./services/backend/pyproject.toml
            - uv run uv-bump --pyproject-toml ./services/indexer/pyproject.toml
            - uv run uv-bump --pyproject-toml ./packages/db/pyproject.toml
            - uv run uv-bump --pyproject-toml ./packages/shared_utils/pyproject.toml
            - task: backend:install

    # Frontend specific tasks
    frontend:install:
        desc: Install frontend dependencies using pnpm
        cmds:
            - pnpm install -r

    frontend:update:
        desc: Update frontend dependencies to latest versions
        cmds:
            - pnpm up -r --latest
            -
    # Database tasks
    db:up:
        desc: Start the local PostgreSQL database container
        cmds:
            - docker compose stop && docker compose up db --detach

    db:down:
        desc: Stop and remove the local database container
        cmds:
            - docker compose down db

    db:migrate:
        desc: Apply all pending database migrations
        dir: "{{.PACKAGES_DIR}}/db"
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run alembic upgrade head

    db:create-migration:
        desc: Generate a new database migration from schema changes
        dir: "{{.PACKAGES_DIR}}/db"
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

    db:seed:
        desc: Populate database with initial seed data
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run scripts/seed_db.py
