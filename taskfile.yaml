version: "3"

vars:
  PYTHON_PATH: "."

tasks:
  # ==============================================================================
  # ==============================================================================

  setup:
    desc: Initial project setup - installs all dependencies and git hooks
    cmds:
      - task: frontend:install
      - task: backend:install
      - task: generate:ai-rules
      - uv run lefthook install

  setup:claude:
    desc: Setup Claude MCP integrations (Model Context Protocol)
    preconditions:
      - sh: command -v claude
        msg: "Claude CLI is not installed or not in PATH. Please install Claude Desktop first."
    cmds:
      - claude mcp add --transport sse linear-server https://mcp.linear.app/sse
      - claude mcp add playwright "npx -y @playwright/mcp@latest"
      - claude mcp add ai-rulez "npx -y @ai-rulez/mcp@latest mcp"

  dev:
    desc: Start all backend services in development mode (database, Pub/Sub, backend, indexer, crawler, rag, crdt)
    deps:
      - task: _dev:check
      - task: _dev:init-pubsub
      - task: _dev:init-gcs
      - task: db:migrate
      - task: db:seed
    cmds:
      - echo "📝 Service URLs:"
      - echo "  - Backend API{{":"}} http://localhost:8000"
      - echo "  - Backend API Docs{{":"}} http://localhost:8000/schema/swagger"
      - echo "  - Indexer{{":"}} http://localhost:8001"
      - echo "  - Crawler{{":"}} http://localhost:8002"
      - echo "  - RAG{{":"}} http://localhost:8003"
      - echo "  - CRDT Server{{":"}} ws://localhost:8090"
      - echo "  - Pub/Sub Emulator{{":"}} http://localhost:8085"
      - echo "  - GCS Emulator{{":"}} http://localhost:4443"
      - echo ""
      - echo "Press Ctrl+C to stop all services"
      - docker compose --profile services up

  dev:stop:
    desc: Stop all development services
    cmds:
      - docker compose --profile services down

  test:
    desc: Run all tests (backend services, packages, and frontend) - uses parallel execution by default
    deps:
      - task: backend:test
      - task: frontend:test


  test:ci:
    desc: Run tests in CI mode (serial execution)
    cmds:
      - PYTHONPATH=. uv run pytest -c pytest-ci.ini
      - task: frontend:test

  test:e2e:
    desc: Run all end-to-end tests
    deps:
      - task: service:backend:test:e2e
      - task: service:indexer:test:e2e
      - task: service:crawler:test:e2e
      - task: service:rag:test:e2e
      - task: service:scraper:test:e2e

  lint:
    desc: Run all linters and formatters
    cmds:
      - task: lint:all

  format:
    desc: Format frontend code
    cmds:
      - pnpm --filter './frontend' format

  build:
    desc: Build frontend package
    cmds:
      - pnpm --filter './frontend' build

  knip:
    desc: Check for unused dependencies and dead code in frontend package
    dir: frontend
    cmds:
      - pnpm knip

  update:
    desc: Update all dependencies (frontend and backend) to latest versions
    cmds:
      - corepack up
      - task: frontend:update
      - task: backend:update
      - echo "Ensuring functions requirements.txt is up to date..."
      - task: cloud-functions:generate-requirements

  generate:api-types:
    desc: Generate TypeScript from backend API
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run litestar --app services.backend.src.main:app schema typescript --output frontend/src/types/api-types.ts
      - task: lint:frontend

  generate:openapi-schema:
    desc: Generate the OpenAPI schema from backend API
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run litestar --app services.backend.src.main:app schema openapi --output openapi.json
      - pnpm biome format --write openapi.json

  generate:ai-rules:
    desc: Generate AI assistant configuration files (CLAUDE.md, .windsurfrules, .cursorrules) from ai-rulez.yaml
    cmds:
      - uvx ai-rulez generate --recursive

  db:up:
    desc: Start the local PostgreSQL database container if not already running
    cmds:
      - docker compose up db --detach
    status:
      - docker ps --format "table {{.Names}}" | grep -q "^db$"

  db:down:
    desc: Stop and remove the local database container
    cmds:
      - docker compose down db

  db:migrate:
    desc: Apply database migrations using Alembic
    deps:
      - task: db:up
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      DB_CONNECTION_STRING: "postgresql+asyncpg://local:local@localhost:5432/local"
    cmds:
      - task: _db:wait-for-ready
      - uv run alembic --config ./packages/db/alembic.ini upgrade head

  db:proxy:start:
    desc: Start Cloud SQL Proxy for remote database access
    cmds:
      - |
        if pgrep -f "cloud-sql-proxy.*grantflow-staging" > /dev/null; then
          echo "Cloud SQL Proxy is already running"
        else
          echo "Starting Cloud SQL Proxy..."
          cloud-sql-proxy grantflow:us-central1:grantflow-staging --port=5432 &
          sleep 3
          echo "Cloud SQL Proxy started on 127.0.0.1:5432"
        fi

  db:proxy:stop:
    desc: Stop Cloud SQL Proxy
    cmds:
      - |
        if pgrep -f "cloud-sql-proxy.*grantflow-staging" > /dev/null; then
          echo "Stopping Cloud SQL Proxy..."
          pkill -f "cloud-sql-proxy.*grantflow-staging"
          echo "Cloud SQL Proxy stopped"
        else
          echo "Cloud SQL Proxy is not running"
        fi

  db:proxy:status:
    desc: Check Cloud SQL Proxy status
    cmds:
      - |
        if pgrep -f "cloud-sql-proxy.*grantflow-staging" > /dev/null; then
          echo "✅ Cloud SQL Proxy is running"
          echo "Connection: 127.0.0.1:5432 -> grantflow:us-central1:grantflow-staging"
        else
          echo "❌ Cloud SQL Proxy is not running"
        fi

  db:proxy:restart:
    desc: Restart Cloud SQL Proxy
    cmds:
      - task: db:proxy:stop
      - task: db:proxy:start

  db:migrate:remote:
    desc: Apply database migrations to Cloud SQL (requires Cloud SQL Proxy running)
    deps:
      - task: db:proxy:start
    vars:
      REMOTE_CONNECTION:
        sh: |
          CONNECTION=$(gcloud secrets versions access latest --secret="DATABASE_CONNECTION_STRING" 2>/dev/null || echo "")
          if [ -z "$CONNECTION" ]; then
            echo "Error: Could not fetch DATABASE_CONNECTION_STRING from secrets" >&2
            exit 1
          fi
          # Transform from: postgresql+asyncpg://user:pass@/database?host=/cloudsql/...
          # To: postgresql+asyncpg://user:pass@127.0.0.1:5432/database
          echo "$CONNECTION" | sed 's|@/\([^?]*\).*|@127.0.0.1:5432/\1|'
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      DB_CONNECTION_STRING: "{{.REMOTE_CONNECTION}}"
    cmds:
      - 'echo "Running migrations on Cloud SQL..."'
      - uv run alembic --config ./packages/db/alembic.ini upgrade head

  db:create-migration:
    desc: Generate a new database migration from schema changes
    deps:
      - task: db:up
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      DB_CONNECTION_STRING: "postgresql+asyncpg://local:local@localhost:5433/local"
    cmds:
      - task: _sleep
        vars:
          SECONDS: "2"
      - uv run alembic --config ./packages/db/alembic.ini revision --autogenerate -m "{{.CLI_ARGS}}"

  db:seed:
    desc: Populate database with initial seed data
    deps:
      - task: db:up
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      DATABASE_CONNECTION_STRING: "postgresql+asyncpg://local:local@localhost:5433/local"
    cmds:
      - task: _sleep
        vars:
          SECONDS: "2"
      - uv run python scripts/seed_db.py

  db:seed:remote:
    desc: Populate Cloud SQL database with initial seed data (requires Cloud SQL Proxy running)
    deps:
      - task: db:proxy:start
    vars:
      REMOTE_CONNECTION:
        sh: |
          CONNECTION=$(gcloud secrets versions access latest --secret="DATABASE_CONNECTION_STRING" 2>/dev/null || echo "")
          if [ -z "$CONNECTION" ]; then
            echo "Error: Could not fetch DATABASE_CONNECTION_STRING from secrets" >&2
            exit 1
          fi
          # Transform from: postgresql+asyncpg://user:pass@/database?host=/cloudsql/...
          # To: postgresql+asyncpg://user:pass@127.0.0.1:5432/database
          echo "$CONNECTION" | sed 's|@/\([^?]*\).*|@127.0.0.1:5432/\1|'
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      DATABASE_CONNECTION_STRING: "{{.REMOTE_CONNECTION}}"
    cmds:
      - echo "Running seed on Cloud SQL..."
      - uv run python scripts/seed_db.py

  db:drop:
    desc: "Drop and recreate the development database (WARNING: destroys all data)"
    deps:
      - task: db:up
    vars:
      DB_NAME: local
      DB_USER: local
    cmds:
      - task: _sleep
        vars:
          SECONDS: "2"
      - echo "Dropping the development database..."
      - cmd: |
          docker compose exec -T db psql -U {{.DB_USER}} -d postgres -c "
            SELECT pg_terminate_backend(pid)
            FROM pg_stat_activity
            WHERE datname = '{{.DB_NAME}}' AND pid <> pg_backend_pid();
          " || true
        ignore_error: true
      - docker compose exec -T db psql -U {{.DB_USER}} -d postgres -c "DROP DATABASE IF EXISTS {{.DB_NAME}};"
      - docker compose exec -T db psql -U {{.DB_USER}} -d postgres -c "CREATE DATABASE {{.DB_NAME}} OWNER {{.DB_USER}};"
      - echo "Creating database extensions..."
      - docker compose exec -T db psql -U {{.DB_USER}} -d {{.DB_NAME}} -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
      - docker compose exec -T db psql -U {{.DB_USER}} -d {{.DB_NAME}} -c "CREATE EXTENSION IF NOT EXISTS \"vector\";"
      - echo "✅ Database dropped and recreated successfully!"

  db:reset:
    desc: "Drop database and re-run migrations (WARNING: destroys all data)"
    cmds:
      - task: db:drop
      - task: db:migrate
      - echo "✅ Database reset complete!"

  frontend:install:
    desc: Install dependencies for frontend using pnpm
    cmds:
      - pnpm install -r

  frontend:update:
    desc: Update frontend dependencies to latest versions
    cmds:
      - pnpm up --latest -r

  frontend:test:watch:
    desc: Run frontend tests (interactive mode) - main frontend only
    dir: frontend
    dotenv: [".env"]
    cmds:
      - pnpm test:watch

  frontend:storybook:
    desc: Start the main frontend Storybook server
    dir: frontend
    cmds:
      - pnpm run storybook

  frontend:test:e2e:
    desc: Run frontend end-to-end tests with Playwright
    dir: frontend
    dotenv: [".env"]
    cmds:
      - pnpm test:e2e


  frontend:dev:
    desc: Start the main frontend development server
    dir: frontend
    dotenv: [".env"]
    cmds:
      - pnpm dev

  frontend:build:
    desc: Build the main frontend application for production
    dir: frontend
    cmds:
      - pnpm build

  frontend:test:
    desc: Run main frontend tests (non-interactive mode)
    dir: frontend
    dotenv: [".env"]
    cmds:
      - pnpm test

  frontend:test:coverage:
    desc: Run main frontend tests with coverage reporting
    dir: frontend
    dotenv: [".env"]
    cmds:
      - pnpm test:coverage


  backend:install:
    desc: Install services dependencies using uv
    cmds:
      - uv sync --all-packages --all-extras --all-groups

  backend:update:
    desc: Update backend dependencies to latest versions
    cmds:
      - uv sync --all-packages --all-extras --all-groups --upgrade
      - uv run uv-bump --pyproject-toml ./pyproject.toml
      - uv run uv-bump --pyproject-toml ./services/backend/pyproject.toml
      - uv run uv-bump --pyproject-toml ./services/indexer/pyproject.toml
      - uv run uv-bump --pyproject-toml ./services/crawler/pyproject.toml
      - uv run uv-bump --pyproject-toml ./services/rag/pyproject.toml
      - uv run uv-bump --pyproject-toml ./services/scraper/pyproject.toml
      - uv run uv-bump --pyproject-toml ./packages/db/pyproject.toml
      - uv run uv-bump --pyproject-toml ./packages/shared_utils/pyproject.toml
      - uv run uv-bump --pyproject-toml ./functions/pyproject.toml
      - echo "Regenerating functions requirements.txt for deployment..."
      - uv pip compile functions/pyproject.toml -o functions/requirements.txt
      - task: backend:install

  backend:test:
    desc: Run all backend tests (services and shared packages)
    deps:
      - task: service:backend:test
      - task: service:indexer:test
      - task: service:crawler:test
      - task: service:rag:test
      - task: service:scraper:test
      - task: _packages:test


  service:backend:test:
    desc: Run backend service tests with detailed output
    dotenv: [".env"]
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/backend/tests -v

  service:backend:test:e2e:
    desc: Run backend service end-to-end tests
    dotenv: [".env"]
    env:
      E2E_TESTS: "1"
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/backend/tests -v


  service:indexer:test:
    desc: Run indexer service tests with detailed output
    dotenv: [".env"]
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/indexer/tests -v

  service:indexer:test:e2e:
    desc: Run indexer service end-to-end tests
    dotenv: [".env"]
    env:
      E2E_TESTS: "1"
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/indexer/tests -v



  service:crawler:test:
    desc: Run crawler service tests with detailed output
    dotenv: [".env"]
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/crawler/tests -v

  service:crawler:test:e2e:
    desc: Run crawler service end-to-end tests
    dotenv: [".env"]
    env:
      E2E_TESTS: "1"
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/crawler/tests -v


  service:rag:test:
    desc: Run RAG service tests with detailed output (parallel execution)
    dotenv: [".env"]
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
      PUBSUB_EMULATOR_HOST: "localhost:8085"
    cmds:
      - uv run pytest services/rag/tests -v


  service:rag:test:e2e:
    desc: Run RAG service end-to-end tests
    dotenv: [".env"]
    env:
      E2E_TESTS: "1"
      PYTHONPATH: "{{.PYTHON_PATH}}"
      PUBSUB_EMULATOR_HOST: "localhost:8085"
    cmds:
      - uv run pytest services/rag/tests -v



  service:scraper:test:
    desc: Run scraper service tests with detailed output (parallel execution)
    dotenv: [".env"]
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/scraper/tests -v


  service:scraper:test:e2e:
    desc: Run scraper service end-to-end tests
    dotenv: [".env"]
    env:
      E2E_TESTS: "1"
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest services/scraper/tests/e2e/ -v



  lint:all:
    desc: Run all linters and formatters on all files
    deps:
      - task: lint:frontend
      - task: lint:python
      - task: lint:codespell
      - task: lint:terraform

  lint:frontend:
    desc: Run all frontend linters (Biome, ESLint, and TypeScript)
    deps:
      - task: lint:biome
      - task: lint:eslint
      - task: lint:typescript

  lint:python:
    desc: Run all Python linters (Ruff and MyPy)
    deps:
      - task: lint:ruff
      - task: lint:mypy

  lint:biome:
    desc: Format and lint frontend code with Biome
    dir: frontend
    cmds:
      - pnpm biome check --write .
      - pnpm biome format --write .

  lint:eslint:
    desc: Lint frontend JavaScript/TypeScript with ESLint
    dir: frontend
    cmds:
      - pnpm eslint . --fix --max-warnings=0 --no-warn-ignored --cache

  lint:ruff:
    desc: Lint and format Python code with Ruff
    cmds:
      - uv run ruff check --fix --unsafe-fixes .
      - uv run ruff format .

  lint:mypy:
    desc: Type check Python code with MyPy
    cmds:
      - uv run mypy .

  lint:codespell:
    desc: Check for common misspellings
    cmds:
      - uv run codespell . --skip="packages/*/tests/**/*,services/*/tests/**/*,test_data,pnpm-lock.yaml,.git,node_modules,.venv,*.pyc,*.pyo,__pycache__,storybook-static,.next,*.min.js,playwright-report,test-results"

  lint:typescript:
    desc: Type check frontend TypeScript code
    dir: frontend
    cmds:
      - pnpm typecheck

  lint:terraform:
    desc: Run all Terraform linters (tofu validate, tflint, trivy)
    deps:
      - task: lint:terraform:fmt
      - task: lint:terraform:validate
      - task: lint:terraform:tflint
      - task: lint:terraform:trivy

  lint:terraform:validate:
    desc: Validate Terraform configuration using tofu validate
    status:
      - '! command -v tofu'
    cmds:
      - echo "Validating terraform configuration..."
      - tofu -chdir=terraform init -backend=false
      - tofu -chdir=terraform validate

  lint:terraform:fmt:
    desc: Format Terraform code using tofu fmt
    status:
      - '! command -v tofu'
    cmds:
      - echo "Formatting terraform code..."
      - tofu fmt -recursive ./terraform

  lint:terraform:tflint:
    desc: Lint Terraform code with tflint
    status:
      - '! command -v tflint'
    cmds:
      - echo "Running tflint on terraform directory..."
      - tflint --chdir=terraform

  lint:terraform:trivy:
    desc: Security scan Terraform code with trivy
    status:
      - '! command -v trivy'
    cmds:
      - echo "Running trivy on terraform directory..."
      - trivy config ./terraform


  cloud-functions:generate-requirements:
    desc: Generate requirements.txt files from pyproject.toml for cloud functions deployment
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - echo "📦 Generating requirements.txt for Cloud Functions from workspace dependencies..."
      - |
        uv export \
          --format requirements-txt \
          --output-file functions/dlq_manager/requirements.txt \
          --no-hashes \
          --no-editable \
          --group functions
      - echo "🔧 Removing workspace package references (packages will be copied directly)..."
      - grep -v "^\./packages/" functions/dlq_manager/requirements.txt > functions/dlq_manager/requirements.txt.tmp && mv functions/dlq_manager/requirements.txt.tmp functions/dlq_manager/requirements.txt
      - echo "✅ Requirements.txt generated successfully for Cloud Functions deployment!"


  _dev:check:
    internal: true
    deps:
      - task: _dev:check-tools
      - task: _dev:check-env
    cmds:
      - echo "✅ Development environment is ready"

  _dev:check-tools:
    internal: true
    preconditions:
      - sh: command -v docker
        msg: "Docker is required. Please install from https://docs.docker.com/get-docker/"
      - sh: command -v docker-compose || command -v docker compose
        msg: "Docker Compose is required. Please install Docker Desktop"
      - sh: command -v uv
        msg: "uv is required. Please install from https://github.com/astral-sh/uv"
      - sh: command -v pnpm
        msg: "pnpm is required. Please install from https://pnpm.io/installation"
      - sh: command -v gcloud
        msg: "gcloud CLI is required. Please install from https://cloud.google.com/sdk/docs/install"
    silent: true

  _dev:check-env:
    internal: true
    preconditions:
      - sh: test -f .env
        msg: |
          Missing .env file.
          Copy from example: cp .env.example .env
    silent: true

  _dev:init-pubsub:
    internal: true
    env:
      PUBSUB_EMULATOR_HOST: localhost:8085
      PUBSUB_PROJECT_ID: grantflow
    cmds:
      - docker compose --profile services up -d pubsub-emulator
      - task: _dev:wait-for-service
        vars:
          SERVICE_NAME: "Pub/Sub emulator"
          SERVICE_URL: "http://localhost:8085"
          MAX_RETRIES: "30"
      - uv run python scripts/init-pubsub-emulator.py
      - echo "✅ Pub/Sub emulator initialized"

  _dev:init-gcs:
    internal: true
    env:
      STORAGE_EMULATOR_HOST: http://localhost:4443
    cmds:
      - docker compose --profile services up -d gcs-emulator
      - task: _dev:wait-for-service
        vars:
          SERVICE_NAME: "GCS emulator"
          SERVICE_URL: "http://localhost:4443/storage/v1/b"
          MAX_RETRIES: "30"
      - uv run python scripts/init-gcs-emulator.py
      - echo "✅ GCS emulator initialized"

  _dev:wait-for-service:
    internal: true
    vars:
      SERVICE_NAME: "{{.SERVICE_NAME}}"
      SERVICE_URL: "{{.SERVICE_URL}}"
      MAX_RETRIES: '{{.MAX_RETRIES | default "30"}}'
    cmds:
      - cmd: |
          echo "Waiting for {{.SERVICE_NAME}} to be ready..."
          for i in $(seq 1 {{.MAX_RETRIES}}); do
            if curl -sf {{.SERVICE_URL}} >/dev/null 2>&1; then
              echo "✅ {{.SERVICE_NAME}} is ready"
              exit 0
            fi
            printf "."
            sleep 1
          done
          echo ""
          echo "❌ {{.SERVICE_NAME}} failed to start after {{.MAX_RETRIES}} seconds"
          exit 1
        platforms: [darwin, linux]
      - cmd: |
          echo "Waiting for {{.SERVICE_NAME}} to be ready..."
          powershell -Command "
            for ($i = 1; $i -le {{.MAX_RETRIES}}; $i++) {
              try {
                Invoke-WebRequest -Uri '{{.SERVICE_URL}}' -UseBasicParsing -ErrorAction Stop | Out-Null
                Write-Host '✅ {{.SERVICE_NAME}} is ready'
                exit 0
              } catch {
                Write-Host -NoNewline '.'
                Start-Sleep -Seconds 1
              }
            }
            Write-Host ''
            Write-Host '❌ {{.SERVICE_NAME}} failed to start after {{.MAX_RETRIES}} seconds'
            exit 1
          "
        platforms: [windows]


  _packages:test:
    internal: true
    cmds:
      - task: _package:db:test
      - task: _package:shared-utils:test

  _package:db:test:
    internal: true
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest packages/db/tests -v

  _package:shared-utils:test:
    internal: true
    env:
      PYTHONPATH: "{{.PYTHON_PATH}}"
    cmds:
      - uv run pytest packages/shared_utils/tests -v

  _sleep:
    internal: true
    vars:
      SECONDS: '{{.SECONDS | default "2"}}'
    cmds:
      - cmd: sleep {{.SECONDS}}
        platforms: [darwin, linux]
      - cmd: timeout /t {{.SECONDS}} /nobreak > nul
        platforms: [windows]

  _db:wait-for-ready:
    internal: true
    cmds:
      - cmd: |
          echo "Waiting for database to be ready..."
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U local -d local >/dev/null 2>&1; then
              echo "✅ Database is ready"
              exit 0
            fi
            printf "."
            sleep 1
          done
          echo ""
          echo "❌ Database failed to become ready after 30 seconds"
          exit 1
        platforms: [darwin, linux]
      - cmd: |
          echo "Waiting for database to be ready..."
          powershell -Command "
            for ($i = 1; $i -le 30; $i++) {
              docker compose exec -T db pg_isready -U local -d local >$null 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host '✅ Database is ready'
                exit 0
              }
              Write-Host -NoNewline '.'
              Start-Sleep -Seconds 1
            }
