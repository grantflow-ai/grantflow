version: "3"

vars:
    FRONTEND_DIR: frontend

tasks:
    # Repo Commands
    setup:
        desc: Initial project setup - installs all dependencies and git pre-commit hooks
        cmds:
            - pre-commit install && pre-commit install --hook-type commit-msg && pre-commit install-hooks
            - task: frontend:install
            - task: backend:install

    update:
        desc: Update all dependencies (frontend and backend) and pre-commit hooks to latest versions
        cmds:
            - task: frontend:update
            - task: backend:update
            - pre-commit autoupdate

    lint:
        desc: Run all linters and formatters
        cmds:
            - pre-commit run --show-diff-on-failure --color=always --all-files

    dev:
        desc: Start all services in development mode (database, Pub/Sub emulator, backend, indexer, and frontend)
        deps:
            - task: db:up
            - task: emulator:gcs:up
            - task: emulator:pubsub:up
        cmds:
            - task: _dev:services

    test:
        desc: Run all tests (backend services, packages, and frontend)
        deps:
            - task: backend:test
            - task: frontend:test

    test:e2e:
        desc: Run all end-to-end tests
        deps:
            - task: service:backend:test:e2e
            - task: service:indexer:test:e2e
            - task: service:crawler:test:e2e

    generate:api-types:
        desc: Generate TypeScript from backend API
        cmds:
            - PYTHONPATH=. uv run litestar --app services.backend.src.main:app schema typescript --output frontend/src/types/api-types.ts
            - task: lint

    # Database Commands

    db:up:
        desc: Start the local PostgreSQL database container if not already running
        cmds:
            - |
                if [ -z "$(docker ps -q -f name=db)" ]; then
                  docker compose up db --detach
                fi

    db:down:
        desc: Stop and remove the local database container
        cmds:
            - docker compose down db

    db:migrate:
        desc: Apply database migrations using Alembic
        cmds:
            - PYTHONPATH=. uv run alembic --config ./packages/db/alembic.ini upgrade head
        deps:
            - task: db:up

    db:create-migration:
        desc: Generate a new database migration from schema changes
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run alembic --config ./packages/db/alembic.ini revision --autogenerate -m "{{.CLI_ARGS}}"
        deps:
            - task: db:up
    db:seed:
        desc: Populate database with initial seed data
        cmds:
            - task: db:up
            - sleep 2
            - PYTHONPATH=. uv run scripts/seed_db.py

    # Emulator Commands

    emulator:pubsub:up:
        desc: Start the Google Cloud Pub/Sub emulator for local development
        cmds:
            - gcloud beta emulators pubsub start --project=grantflow

    emulator:gcs:up:
        desc: Start the Google Cloud Storage emulator for local development
        cmds:
            - docker compose --profile gcs up
    # Frontend Commands

    frontend:install:
        desc: Install frontend dependencies using pnpm
        cmds:
            - pnpm install -r

    frontend:update:
        desc: Update frontend dependencies to latest versions
        cmds:
            - pnpm up -r --latest

    frontend:dev:
        desc: Start the frontend development server
        dir: "{{.FRONTEND_DIR}}"
        dotenv: [".env"]
        cmds:
            - pnpm dev

    frontend:test:
        desc: Run frontend tests (non-interactive mode)
        dir: "{{.FRONTEND_DIR}}"
        dotenv: [".env"]
        cmds:
            - pnpm test run

    # Backend Commands

    backend:install:
        desc: Install services dependencies using uv
        cmds:
            - uv sync --all-packages --all-extras --dev

    backend:update:
        desc: Update backend dependencies to latest versions
        cmds:
            - uv sync --upgrade --all-packages --all-extras
            - uv run uv-bump --pyproject-toml ./pyproject.toml
            - uv run uv-bump --pyproject-toml ./services/backend/pyproject.toml
            - uv run uv-bump --pyproject-toml ./services/indexer/pyproject.toml
            - uv run uv-bump --pyproject-toml ./services/crawler/pyproject.toml
            - uv run uv-bump --pyproject-toml ./packages/db/pyproject.toml
            - uv run uv-bump --pyproject-toml ./packages/shared_utils/pyproject.toml
            - task: backend:install

    backend:test:
        desc: Run all backend tests (services and shared packages)
        deps:
            - task: service:backend:test
            - task: service:indexer:test
            - task: service:crawler:test
            - task: packages:test

    service:backend:dev:
        desc: Start the backend API service in development mode with hot-reloading
        deps:
            - task: db:up
        dotenv: ["services/backend/.env"]
        cmds:
            - PYTHONPATH=. uv run uvicorn services.backend.src.main:app --host 0.0.0.0 --port 8000 --log-level debug --reload --reload-dir services/backend/src

    service:indexer:dev:
        desc: Start the indexer service in development mode with hot-reloading
        deps:
            - task: db:up
        dotenv: ["services/indexer/.env"]
        cmds:
            - PYTHONPATH=. uv run uvicorn services.indexer.src.main:app --host 0.0.0.0 --port 8001 --log-level debug --reload --reload-dir services/indexer/src

    service:backend:test:
        desc: Run backend service tests with detailed output
        dotenv: ["services/backend/.env"]
        cmds:
            - PYTHONPATH=. uv run pytest services/backend/tests -v

    service:backend:test:e2e:
        desc: Run backend service end-to-end tests
        dotenv: ["services/backend/.env"]
        cmds:
            - E2E_TESTS=1 PYTHONPATH=. uv run pytest services/backend/tests -v

    service:indexer:test:
        desc: Run indexer service tests with detailed output
        dotenv: ["services/indexer/.env"]
        cmds:
            - PYTHONPATH=. uv run pytest services/indexer/tests -v

    service:indexer:test:e2e:
        desc: Run indexer service end-to-end tests
        dotenv: ["services/indexer/.env"]
        cmds:
            - E2E_TESTS=1 PYTHONPATH=. uv run pytest services/indexer/tests -v

    service:crawler:dev:
        desc: Start the crawler service in development mode with hot-reloading
        deps:
            - task: db:up
        dotenv: ["services/crawler/.env"]
        cmds:
            - PYTHONPATH=. uv run uvicorn services.crawler.src.main:app --host 0.0.0.0 --port 8002 --log-level debug --reload --reload-dir services/crawler/src

    service:crawler:test:
        desc: Run crawler service tests with detailed output
        dotenv: ["services/crawler/.env"]
        cmds:
            - PYTHONPATH=. uv run pytest services/crawler/tests -v

    service:crawler:test:e2e:
        desc: Run crawler service end-to-end tests
        dotenv: ["services/crawler/.env"]
        cmds:
            - E2E_TESTS=1 PYTHONPATH=. uv run pytest services/crawler/tests -v

    packages:test:
        desc: Run all shared packages tests
        cmds:
            - task: package:db:test
            - task: package:shared-utils:test

    package:db:test:
        desc: Run database package tests with detailed output
        cmds:
            - PYTHONPATH=. uv run pytest packages/db/tests -v

    package:shared-utils:test:
        desc: Run shared utility package tests with detailed output
        cmds:
            - PYTHONPATH=. uv run pytest packages/shared_utils/tests -v

    terraform:lint:
        desc: Run linting tools (tflint and trivy) on terraform code
        cmds:
            - |
                # Check if tflint is installed
                if ! command -v tflint &> /dev/null; then
                    echo "Error: tflint is not installed. Please install it from https://github.com/terraform-linters/tflint"
                    exit 1
                fi

                # Check if trivy is installed
                if ! command -v trivy &> /dev/null; then
                    echo "Error: trivy is not installed. Please install it from https://aquasecurity.github.io/trivy/"
                    exit 1
                fi

                # Run tflint on terraform directory
                echo "Running tflint on terraform directory..."
                tflint --chdir=terraform

                # Run trivy on terraform directory
                echo "Running trivy on terraform directory..."
                trivy config ./terraform

    terraform:fmt:
        desc: Format terraform code using tofu fmt
        cmds:
            - |
                # Check if tofu is installed
                if ! command -v tofu &> /dev/null; then
                    echo "Error: OpenTofu is not installed. Please install it from https://opentofu.org/docs/intro/install/"
                    exit 1
                fi

                # Run tofu fmt on terraform directory
                echo "Formatting terraform code..."
                tofu fmt --recursive ./terraform

    # Internal Tasks
    _dev:services:
        internal: true
        deps:
            - task: service:backend:dev
            - task: service:indexer:dev
            - task: service:crawler:dev
            - task: frontend:dev
