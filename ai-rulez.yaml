$schema: https://github.com/Goldziher/ai-rulez/schema/ai-rules-v1.schema.json

metadata:
  name: "GrantFlow.AI"
  version: "1.2.0"
  description: "GrantFlow.AI Development Guide"

outputs:
  - file: "CLAUDE.md"
  - file: "GEMINI.md"
  - path: ".claude/agents/"
    type: "agent"
    naming_scheme: "{name}.md"

agents:
  - name: "system-architect"
    description: "System architecture and design decisions"
    system_prompt: |
      System architecture specialist for scalable, maintainable systems.
      Focus: system design, architecture patterns, infrastructure, microservices, Terraform
  
  - name: "typescript-engineer"
    description: "TypeScript/React development specialist"
    system_prompt: |
      TypeScript/React expert for modern web development.
      Focus: TypeScript strict, React 19, Next.js 15 App Router, Zustand, testing with ::testing/factories
  
  - name: "python-engineer"
    description: "Python backend development specialist"
    system_prompt: |
      Python backend engineer for async web services.
      Focus: Python 3.13+, Litestar async, SQLAlchemy 2.0, structlog with key=value pairs
  
  - name: "devops-agent"
    description: "DevOps and CI/CD specialist"
    system_prompt: |
      DevOps engineer for CI/CD and cloud infrastructure.
      Focus: GitHub Actions, GitOps, Docker multi-stage builds, zero-downtime deployments

rules:
  - name: "System Prompt"
    priority: 100
    content: |
      Efficient developer following structured process: implement → typecheck → lint → test (use factories)
      
      **ALWAYS use Taskfile**: `task --list` for commands, check Taskfile.yaml if needed

  - name: "Stack"
    priority: 90
    content: |
      **Frontend**: Next.js 15, React 19, TypeScript, Tailwind, Vite
      **Backend**: Python 3.13, Litestar, msgspec, SQLAlchemy 2.0 async, structlog
      **Services**: backend, indexer, crawler, rag, scraper, crdt-server (Hocuspocus CRDT)
      **Cloud**: GCP, Cloud Run, Cloud SQL PostgreSQL, pgvector, Firebase Auth
      **Tools**: pnpm, uv, tofu (not terraform), Docker Compose
      **Linting**: Biome, ESLint, MyPy, Ruff, Codespell, Knip

  - name: "Core Rules"
    priority: 85
    content: |
      - NO inline comments/docstrings
      - Type all Python args/returns
      - Use `??` not `||`, extract magic numbers
      - 100% test coverage, real PostgreSQL
      - Run linters after changes
      - Use specialized agents in `.claude/agents/` for domain tasks

  - name: "Key Commands"
    priority: 80
    content: |
      ```bash
      # Core workflow
      task setup dev test lint format build
      
      # Linting
      task lint:all lint:frontend lint:python lint:terraform
      
      # Database
      task db:migrate db:reset db:migrate:remote
      
      # Testing
      task test:e2e test:serial
      E2E_TESTS=1 pytest -m "smoke|quality_assessment|e2e_full"
      
      # Services
      task service:{indexer|rag}:test:e2e:{smoke|quality|full}
      
      # Deployment
      task gh:deploy:{backend|crawler|indexer|rag|scraper}
      ```

  - name: "Testing"
    priority: 75
    content: |
      **File naming**: Python `*_test.py`, TypeScript `*.spec.ts(x)`
      
      **Python**: pytest async, real PostgreSQL, PYTHONPATH=. required
      **Frontend**: Vitest + RTL, real Zustand stores, mock APIs only
      **E2E**: Playwright with data-testid, mock environment
      
      **Markers**: smoke (<1min), quality_assessment (2-5min), e2e_full (10+min)
      **Parallel**: pytest-xdist auto-enabled, use `-n 0` to disable
      
      ```python
      @e2e_test(category=E2ETestCategory.SMOKE, timeout=60)
      async def test_basic(logger: logging.Logger) -> None: ...
      ```

  - name: "Patterns"
    priority: 65
    content: |
      **Backend**:
      ```python
      @post("/organizations/{organization_id:uuid}/items", 
            allowed_roles=[UserRoleEnum.COLLABORATOR])
      async def create_item(organization_id: UUID, data: TypedDict, 
                          session_maker: async_sessionmaker[Any]) -> dict:
          async with session_maker() as session, session.begin():
              # Middleware validated access - just business logic
              item = await session.scalar(
                  insert(Item).values(**data, organization_id=organization_id).returning(Item)
              )
              return {"id": str(item.id)}
      ```
      
      **Frontend**:
      ```typescript
      export async function createItem(organizationId: string, data: API.CreateItem.RequestBody) {
          return withAuthRedirect(
              getClient().post(`organizations/${organizationId}/items`, {
                  headers: await createAuthHeaders(),
                  json: data,
              }).json<API.CreateItem.ResponseBody>(),
          );
      }
      ```

  - name: "TypeScript Guidelines"
    priority: 60
    content: |
      - Never use `any`, use type guards from `@tool-belt/type-predicates`
      - Use `??` and `?.`, early returns, destructuring
      - Wrap API calls with `withAuthRedirect`
      - Use factories from `::testing/factories`

  - name: "Python Guidelines"
    priority: 55
    content: |
      - TypedDict with `NotRequired[type]`, not `type | None`
      - structlog with key=value: `logger.info("Created", id=str(id))`
      - UUIDs as strings, datetime as `.isoformat()`
      - Handle unique constraints gracefully

  - name: "CI/CD"
    priority: 53
    content: |
      **Workflows**: `build-service-*.yaml`, `ci-*.yaml`, `deploy-services.yaml`
      **Actions**: Reusable composites in `.github/actions/`
      **Branches**: development→staging, main→production
      **Tags**: staging-{sha}, staging-latest, {sha}, latest

  - name: "Deployment"
    priority: 52
    content: |
      **Firebase App Hosting**: Terraform-managed, NOT apphosting.yaml
      **Cloud Run**: All backend services
      **Database**: Cloud SQL with proxy for local
      **Storage**: Environment-specific buckets (grantflow-staging-uploads)

  - name: "Key Learnings"
    priority: 50
    content: |
      - Create draft entities early for uploads
      - Handle Pub/Sub duplicates with `ON CONFLICT DO NOTHING`
      - WebSocket endpoint: `/projects/{id}/applications/{id}/notifications`
      - Environment vars: Frontend `getEnv()` throws, Backend `get_env()` with fallback
      - Topics: url-crawling, frontend-notifications, file-indexing, rag-processing
      - CRDT Server: Hocuspocus extensions pattern, health checks at `/health` + `/ready`

  - name: "Monitoring"
    priority: 48
    content: |
      **OpenTelemetry**: trace_id correlation, structlog integration
      ```python
      configure_otel("service-name")
      with start_span_with_trace_id("op", trace_id=trace_id) as span: ...
      ```
      **Alerts**: Service down, DB disconnected, high errors → Discord webhook

  - name: "Auth"
    priority: 46
    content: |
      **Firebase Auth** + JWT with organization_id/role claims
      **URL pattern**: `/organizations/{id}/projects/{id}/applications/{id}`
      **Roles**: OWNER > ADMIN > COLLABORATOR
      **Middleware handles all auth** - never check manually in endpoints

  - name: "Common Issues"
    priority: 37
    content: |
      - YAML colons need quotes: `- 'echo "Key: value"'`
      - Cloud SQL: Unix socket→TCP for local (127.0.0.1:5432)
      - Drop ENUMs before tables: `DROP TYPE IF EXISTS name CASCADE`
      - Frontend Docker needs build args for env vars

  - name: "Linting"
    priority: 30
    content: |
      **Biome**: Primary JS/TS formatter/linter
      **Workflow**: `task lint` → fix Biome → fix ESLint → fix Python
      **Common fixes**: Extract complex functions, add button types, remove `any`

  - name: "Important Reminders"
    priority: 35
    content: |
      - Do only what's asked, nothing more
      - NEVER create files unless necessary
      - NEVER create docs/README unless requested
      - Preserve `~keep` comments during refactoring