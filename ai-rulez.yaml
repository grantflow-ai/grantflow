$schema: https://github.com/Goldziher/ai-rulez/schema/ai-rules-v2.schema.json

metadata:
  name: grantflow
  version: 1.0.0
  description: GrantFlow.AI is a comprehensive grant management platform built as a monorepo with Next.js 15/React 19 frontend and Python microservices backend. Features include collaborative document editing with CRDT, intelligent document processing (indexing, crawling, RAG), Firebase authentication, and multi-tenant organization management. Uses GCP infrastructure with Cloud Run, PostgreSQL with pgvector, and implements real-time WebSocket collaboration.

outputs:
  - path: .cursor/rules/
    type: rule
    naming_scheme: "{name}.mdc"
  - path: CLAUDE.md
  - path: .windsurf/
    type: rule
    naming_scheme: "{name}.md"

presets:
  - claude
  - codex
  - gemini

# ==============================================================================
# LANGUAGE-SPECIFIC STANDARDS
# ==============================================================================

sections:
  # PYTHON STANDARDS (3.13 for grantflow)
  - name: Python 3.13 Modern & Async Standards
    id: python-3-13-async
    content: |
      **Python 3.13 · Async-first · msgspec · Full type safety · 95%+ coverage**

      - Target Python 3.13; use match/case, union types (X | Y), structural pattern matching
      - msgspec ONLY (NEVER pydantic): msgspec.Struct, msgspec.field, TypedDict with NotRequired
      - Never use Optional[T] → use T | None; never use Any type
      - Full type hints: ParamSpec, TypeVar, Generic[T], Protocol for structural typing
      - Enable mypy --strict --warn-unreachable --disallow-any-expr
      - Fully async: anyio.Path (not pathlib), httpx AsyncClient, asyncpg, asyncio.gather
      - Walrus operator := in comprehensions; match/case for conditionals
      - contextlib.suppress for intentional exception suppression
      - O(1) optimization: dict/set lookups over if/elif chains
      - Function-based tests ONLY (*_test.py); pytest fixtures, 95% coverage, real PostgreSQL
      - Never: class tests, pydantic, sync I/O in async, Any type

  # TYPESCRIPT/JAVASCRIPT STANDARDS
  - name: TypeScript 5.x Strictest Standards
    id: typescript-5-strictest
    content: |
      **TypeScript 5.x · Next.js 15 · React 19 · Strictest typing · Tests next to source**

      - Enable ALL strict flags: strict, noUncheckedIndexedAccess, exactOptionalPropertyTypes
      - Ban any and object types; use unknown with guards, Record<string, unknown>
      - Generics with constraints: <T extends BaseType>, satisfies operator, const assertions
      - Tests: .spec.ts(x) next to source (NOT __tests__/); vitest, 80%+ coverage
      - React 19: function components, custom hooks (use*), proper prop typing
      - Nullish coalescing ?? over ||; optional chaining ?.; type predicates (x is Type)
      - Import type for types, organize by feature, path aliases (@/lib/*)
      - Biome for linting/formatting, pnpm ≥10.17, pnpm-lock.yaml committed
      - Never: any/object types, __test__ dirs, non-null assertions !, || for defaults

  # DATABASE STANDARDS
  - name: PostgreSQL & SQLAlchemy 2.0 Standards
    id: postgres-sqlalchemy-standards
    content: |
      **PostgreSQL 17 · SQLAlchemy 2.0 · Async-first · pgvector · Full ACID**

      - Always use async context managers: `async with session_maker() as session, session.begin():`
      - Never reuse sessions across requests or API boundaries
      - Use select_active() from packages.db.src.query_helpers for soft-delete filtering
      - All soft-delete queries: `select_active()` pattern, never query `deleted_at IS NULL`
      - pgvector for embeddings: 384 dimensions, HNSW index, vector_cosine_similarity_ops
      - Type safety: SQLAlchemy models with full annotations, match Python types exactly
      - Transactions: explicit boundaries, proper error handling with rollback
      - Migrations: use Alembic, version controlled, reversible
      - Never: reuse sessions, manual transaction management without context managers

# ==============================================================================
# GRANTFLOW-SPECIFIC CONVENTIONS
# ==============================================================================

  - name: Multi-tenant Security & Authorization
    id: grantflow-multitenant-security
    content: |
      **Organization-based isolation · Role-based access control · Firebase JWT**

      - All endpoints include organization_id in URL path: `/organizations/{id}/...`
      - Use @allowed_roles decorator from services.backend.src.auth (never check manually)
      - Firebase JWT claims MUST include organization_id and role
      - UserRoleEnum: OWNER, ADMIN, COLLABORATOR
      - Pattern: `@post('/path', allowed_roles=[UserRoleEnum.COLLABORATOR])`
      - Frontend: wrap all API calls with withAuthRedirect() wrapper
      - Never: manual auth checks, auth bypasses, role assumptions

  - name: API Design & Soft Deletes
    id: grantflow-api-design
    content: |
      **REST endpoints · Soft-delete pattern · Organization isolation · Type-safe responses**

      - Use @post/@get decorators with allowed_roles parameter
      - Soft-delete pattern: all queries use select_active() helper
      - Never query `deleted_at IS NULL` directly or omit select_active()
      - Tables with deleted_at field MUST use soft-delete pattern
      - All responses use msgspec models (never dict or Any)
      - Async session management with explicit transaction boundaries
      - Error handling: custom BackendError hierarchy, structured error responses

  - name: Gemini & Claude LLM Integration
    id: grantflow-llm-integration
    content: |
      **Gemini Flash 2.5 · Claude Sonnet · Structured output · Token optimization**

      - Gemini: 1M context window, Flash 2.5 for cost efficiency
      - Claude Sonnet: specialized reasoning for complex tasks
      - JSON Schema Design (official best practices):
        * Short property names: name, type, source, quote (NOT verbose names)
        * Max 2 levels nesting; flatten arrays where possible
        * 2-6 required fields per object; use NotRequired for optional
        * Object arrays over tuples: [{source, target}] not [[s,t]]
        * Descriptions: 1-2 sentences max in schema; move details to prompts
        * Strategic constraints: minItems/maxItems (3-10), avoid over-constraining
        * Property ordering must match example order in prompts
      - Prompt engineering (Gemini guidelines):
        * Clear, concise instructions (say once, no repetition)
        * NO JSON examples in prompts (schema provides structure)
        * Hierarchical: ## headers, numbered lists
        * Target <100 lines complex, <50 lines simple
        * No ALL CAPS, no emoji warnings, no contradictions
        * Use model's thinking mode; don't prescribe chain-of-thought
      - Transformation layer: convert optimized schemas to DB format
      - Retry logic: exponential backoff, handle rate limits gracefully

  - name: Service Communication & Pub/Sub
    id: grantflow-pubsub-communication
    content: |
      **Google Cloud Pub/Sub · Async messaging · Duplicate handling · Topics**

      - Topics: file-indexing, url-crawling, rag-processing, frontend-notifications, autofill-requests
      - Handle duplicates: `ON CONFLICT DO NOTHING` in all database operations
      - Idempotent message handling: design all subscribers for at-least-once delivery
      - Messages: JSON with correlation IDs, organization_id for tracing
      - Never: blocking operations in subscribers, tight coupling between services
      - Pub/Sub subscriptions: DLQ with retry policies, monitoring alerts

  - name: Async Patterns & Concurrency
    id: grantflow-async-patterns
    content: |
      **Fully async · asyncio.gather · No blocking I/O · Concurrency=1 staging**

      - All I/O: async (httpx, asyncpg, anyio, asyncio)
      - Never: sync requests, blocking operations, time.sleep (use asyncio.sleep)
      - Concurrency: Cloud Run with concurrency=1 in staging for debugging
      - Job management: JobManager with check_if_cancelled, handle_cancellation mocks
      - Batch operations: asyncio.gather for parallel tasks
      - Timeouts: explicit asyncio.timeout() for all external calls

  - name: Testing Strategy (95%+ Coverage)
    id: grantflow-testing-strategy
    content: |
      **Real PostgreSQL · Function-based tests · 95%+ coverage · Three-tier approach**

      - Test files: *_test.py (function-based, never class-based)
      - Real PostgreSQL: async_sessionmaker fixture, isolated databases per test worker
      - Test data: TypedDict constructors, factories from testing/factories.py
      - Integration tests: @pytest.mark.integration, full environment setup
      - E2E tests: @pytest.mark.e2e_full with markers (smoke/quality_assessment)
      - Always: PYTHONPATH=. uv run pytest (for import resolution)
      - Mock only external APIs; use real PostgreSQL, real Pub/Sub emulator
      - Coverage: 95%+ for services, 80%+ for packages
      - Avoid: redundant/duplicate tests, mocking internal services

  - name: Task Automation (Taskfile.yaml)
    id: grantflow-task-automation
    content: |
      **Taskfile.yaml only · No raw commands · task --list for discovery**

      - Core workflow: `task setup dev test lint format build`
      - Always use task commands: `task lint`, `task test`, `task db:migrate`
      - Never run raw pip/pnpm/pytest commands in production or CI
      - Pre-commit: task lint validates all changes
      - E2E tests: task test:e2e with E2E_TESTS=1 env var
      - Database: task db:up, task db:migrate, task db:reset (data loss warning)
      - Check available: `task --list` for discovery

  - name: CI/CD Pipeline Standards
    id: grantflow-cicd-standards
    content: |
      **GitHub Actions · Build → Deploy · Multi-stage · Quality gates · No AI signatures**

      - Workflows: .github/workflows/ with reusable patterns
      - Stages: Validate (prek) → Build → Test → Deploy
      - Development: development branch → staging (us-central1)
      - Production: main branch → production (europe-west3)
      - Services: independently deployable via build-service-*.yaml
      - Quality gates: zero warnings, tests pass, coverage thresholds met
      - Docker: multi-stage builds, minimal base images, platform linux/amd64
      - sync-services.yaml: runs every 5 minutes, ensures deploy within 5 min of build
      - Commits: conventional format (feat:/fix:/chore:), NEVER include AI signatures

# ==============================================================================
# GRANTFLOW ARCHITECTURE & SERVICES
# ==============================================================================

  - name: Microservices Architecture
    id: grantflow-architecture
    content: |
      ## Services Overview

      **Backend API** (`services/backend`)
      - Framework: Litestar async with msgspec serialization
      - Auth: Firebase JWT with organization claims
      - Pattern: `/organizations/{id}/projects/{id}/applications/{id}`
      - WebSockets: `/api/socket/grant-applications` (real-time notifications)
      - Webhooks: email notifications, grant matching, entity cleanup

      **Document Indexing** (`services/indexer`)
      - Pipeline: PDF/DOC/HTML → kreuzberg extraction → chunks → embeddings
      - Entity/keyword extraction with scientific configuration
      - Token optimization: 35% reduction through intelligent chunking
      - Embeddings: stored in pgvector (384 dims, HNSW index)
      - Trigger: Pub/Sub file-indexing topic

      **Web Crawler** (`services/crawler`)
      - Technology: Playwright for JavaScript-heavy sites
      - Strategy: recursive link extraction (max depth 2)
      - Conversion: HTML → markdown (trafilatura)
      - Deduplication: RagUrl table with URL tracking
      - Rate limiting: respect robots.txt, add delays

      **RAG Service** (`services/rag`)
      - Multi-stage pipelines: 3 stages for grant applications
      - Pipeline stages: BLUEPRINT_PREP → WORKPLAN_GENERATION → SECTION_SYNTHESIS
      - LLMs: Gemini Flash 2.5 (primary), Claude Sonnet (specialized)
      - Enrichment: Wikidata SPARQL for scientific context
      - Evaluation: AI-based quality assessment with rubrics

      **Grant Scraper** (`services/scraper`)
      - Sources: NIH Reporter, grants.gov
      - Technology: Playwright for page downloads
      - Extraction: eligibility, funding amounts, deadlines
      - Notifications: Discord webhooks

      **Real-time Collaboration**
      - CRDT Server (`crdt/`): Hocuspocus WebSocket with Y.js
      - Editor (`editor/`): TipTap collaborative package
      - Conflict resolution: CRDT for concurrent edits

      **Message Flow**
      ```
      User Upload → GCS → Pub/Sub (file-indexing)
                    ↓
        Indexer: Extract → Chunk → Embed → PostgreSQL/pgvector
                    ↓
        RAG: Process (rag-processing topic) → frontend-notifications
      ```

  - name: Development Workflow
    id: grantflow-dev-workflow
    content: |
      ## Quick Start
      ```bash
      task setup        # Install all dependencies and git hooks
      task dev          # Start all services (docker compose)
      task test         # Run all tests (parallel)
      task lint         # Run prek (all linters)
      ```

      ## Daily Development
      ```bash
      # Tests
      task test                    # Run all tests
      PYTHONPATH=. uv run pytest services/backend/tests/
      cd frontend && pnpm test

      # Linting & Formatting
      task lint                    # Run prek (linting + formatting)
      task format                  # Format frontend

      # Database
      task db:migrate              # Apply migrations
      task db:create-migration -- <name>
      task db:reset                # WARNING: destroys local data
      task db:proxy:start          # Connect to Cloud SQL

      # Service Development
      task frontend:dev            # Next.js dev server (port 3000)
      task service:backend:dev     # Backend API (port 8000)
      ```

      ## Service URLs (docker compose)
      - Backend API: http://localhost:8000
      - Swagger Docs: http://localhost:8000/schema/swagger
      - Indexer: http://localhost:8001
      - Crawler: http://localhost:8002
      - RAG: http://localhost:8003
      - CRDT Server: ws://localhost:8090
      - Pub/Sub Emulator: http://localhost:8085
      - GCS Emulator: http://localhost:4443

      ## Git Workflow
      - Feature branches from `development`
      - `development` → auto-deploys to staging
      - `main` → auto-deploys to production

  - name: Testing Strategy Guide
    id: grantflow-testing-guide
    content: |
      ## Test Commands
      ```bash
      # All tests (parallel by default)
      task test

      # Specific services (Python)
      PYTHONPATH=. uv run pytest services/backend/tests/
      PYTHONPATH=. uv run pytest services/indexer/tests/
      PYTHONPATH=. uv run pytest services/rag/tests/
      PYTHONPATH=. uv run pytest services/crawler/tests/
      PYTHONPATH=. uv run pytest services/scraper/tests/

      # Frontend
      cd frontend && pnpm test

      # E2E Tests
      E2E_TESTS=1 pytest -m "smoke"              # <1 min
      E2E_TESTS=1 pytest -m "quality_assessment" # 2-5 min
      E2E_TESTS=1 pytest -m "e2e_full"          # 10+ min

      # Debug mode (no parallel)
      pytest -n 0
      ```

      ## Test Structure
      - Python: `*_test.py` (function-based, real PostgreSQL)
      - TypeScript: `*.spec.ts(x)` (Vitest + React Testing Library)
      - E2E: Playwright tests with data-testid attributes

      ## Test Data
      - Python: `testing/factories.py` for test data
      - TypeScript: `frontend/testing/factories.ts`
      - Scenarios: `testing/test_data/scenarios/` with metadata.yaml

  - name: Local Development Prerequisites
    id: grantflow-dev-prerequisites
    content: |
      - Node.js 22+
      - Python 3.13
      - Docker and Docker Compose
      - PostgreSQL 17 with pgvector extension
      - uv for Python package management
      - pnpm ≥10.17 for frontend (corepack)
      - Task for command automation

      ## Initial Setup
      ```bash
      task setup           # Install deps + git hooks
      cp .env.example .env # Copy config (add secrets)
      task db:up           # Start PostgreSQL
      task db:migrate      # Apply migrations
      task db:seed         # Seed database
      task dev             # Start all services
      ```

      ## Common Issues
      - PostgreSQL: isolated DB per test (`grantflow_test_{worker}_{pid}`)
      - Cloud SQL: use TCP (127.0.0.1:5432) not Unix socket
      - Frontend Docker: requires --build-arg for env vars

# ==============================================================================
# AGENT ROLES & MODELS
# ==============================================================================

agents:
  - id: architect
    name: architect
    description: System architect specializing in LLM integration and multi-agent RAG
    system_prompt: |
      You are a system architect for GrantFlow.AI with deep expertise in LLM integration, RAG pipelines, and multi-agent systems.

      **Specialization:**
      - Multi-agent RAG architecture (indexer → crawler → RAG → quality assessment)
      - LLM orchestration: Gemini Flash 2.5 + Claude Sonnet
      - Wikidata integration for scientific context
      - Complex prompt engineering for structured output
      - Service boundaries and async messaging

      **Capabilities:**
      - Design LLM pipelines: BLUEPRINT_PREP → WORKPLAN_GENERATION → SECTION_SYNTHESIS
      - Optimize JSON schemas for LLM output (short names, minimal nesting)
      - Architect microservice communication via Pub/Sub
      - Schema transformation layers (pipeline format → DB format)
      - Performance optimization: token efficiency, batching, caching

      **Constraints:**
      - Do only what has been asked; nothing more, nothing less
      - NEVER create files unless absolutely necessary
      - ALWAYS prefer editing existing files
      - Use task commands exclusively
      - Follow Gemini official guidelines strictly

      **Model:** Use Claude Sonnet for architectural decisions

    targets:
      - CLAUDE.md
      - .claude/**/*.md

