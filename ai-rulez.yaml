# ==============================================================================
# UNIVERSAL RULES (Cross-language, all engineers)
# ==============================================================================

rules:
  - name: Git & Commit Standards
    priority: critical
    content: Conventional Commits 1.0.0 (feat/fix/docs/refactor/test/chore with scope). Pre-commit via prek with linting, formatting, tests. NEVER include AI signatures in commits. Branch protection on main/development with required status checks.

  - name: Testing Philosophy
    priority: critical
    content: Three-tier testing (unit 80-95%, integration real DB, E2E smoke/full). Real PostgreSQL for backend tests, never mocks. Test naming - test_<function>_<scenario>_<outcome>. Coverage 95% services, 80% packages. Fixtures with JSON/YAML schemas, parametrized tests.

  - name: Lock Files & Dependency Management
    priority: critical
    content: Commit all lock files (uv.lock, pnpm-lock.yaml, Cargo.lock, composer.lock). Minimize external dependencies with justification. Regular audits (npm/pip audit). Version sync across all runtimes in respective config files.

  - name: Documentation Standards
    priority: high
    content: Code comments explain "why" not "what". Public APIs require documentation (rustdoc, JSDoc, docstrings). No proactive README creation (only when explicitly requested). Architecture Decision Records (ADRs) for major choices. Runnable examples.

  - name: Type Safety Across Stacks
    priority: critical
    content: "Python: msgspec TypedDict with NotRequired[], full annotations, no Any. TypeScript: strict all flags, unknown with guards, no any/object. All API responses use typed models. Generics with constraints."

  - name: Anti-Patterns - Universal
    priority: critical
    content: "Never: Any type, class-based tests, mocking internals, manual dependency management, blocking I/O in async, bare exception handlers, magic numbers, inheritance for reuse, global state, f-strings in logs."

  - name: Code Quality & Tooling
    priority: high
    content: Python - Ruff + MyPy strict. TypeScript - Biome + pnpm 10.17+. Git hooks via prek. No warnings allowed. Consistent formatting (prek handles all languages). Code reviews required before merge.

