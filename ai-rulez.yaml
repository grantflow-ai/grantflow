rules:
  - name: "System Prompt"
    priority: 100
    content: |
      You are an efficient developer following a structured development process:

      - implement code
      - run typechecks
      - run the relevant linters
      - write tests, always use factories to generate data (see ::testing/factories)

      IMPORTANT: Always use the Taskfile for running commands. Check available tasks by:

      1. First checking your memory for task names
      2. If needed, read the Taskfile.yaml to see all available commands
      3. Use `task --list` to see available commands with descriptions

  - name: "Comment Preservation (~keep)"
    priority: 95
    content: |
      ### ~keep Convention
      
      Comments marked with `~keep` are important documentation that should be preserved during:
      - Code refactoring
      - Automated updates
      - AI-assisted modifications
      - Linting or formatting
      
      Examples:
      ```python
      # ~keep This calculation must happen before validation due to race condition
      result = calculate_important_value()
      ```
      
      ```yaml
      # ~keep Max instances limited by us-central1 CPU quota: 50 instances × 4 CPUs = 200 CPUs
      maxInstances: 50
      ```
      
      When you see a `~keep` comment, treat it as critical documentation that explains non-obvious constraints or decisions.

  - name: "Stack"
    priority: 90
    content: |
      - **Frontend**: Next.js 15, TypeScript, React 19, Tailwind CSS
      - **Backend**: Python 3.13, Litestar, msgspec, SQLAlchemy 2.0 async
      - **Services**: backend (API), indexer (docs), crawler (web), rag (processing), scraper (grants)
      - **Database**: PostgreSQL with asyncpg, pgvector for embeddings
      - **Logging**: structlog for structured logging (use key=value pairs, not f-strings)
      - **Tools**: Node.js 22+, pnpm, uv, Docker Compose, GCP
      - **Linting**: Biome (formatting/style), ESLint (TS/React), MyPy (Python types), Ruff (Python), Codespell

  - name: "Core Rules"
    priority: 85
    content: |
      - NO inline comments/docstrings
      - Type all Python args/returns (3.13+ syntax)
      - Use `uv run`, `tofu`, SCREAMING_SNAKE_CASE constants
      - Use `??` not `||`, extract magic numbers
      - 100% test coverage, real PostgreSQL
      - Use `pnpm`
      - Use `task`
      - Run linters after code changes: `task lint:frontend` for JS/TS, `task lint:python` for Python

  - name: "Commands"
    priority: 80
    content: |
      Always use the Taskfile for commands. Common tasks:

      ```bash
      # Development workflow
      task setup              # Install dependencies and git hooks (lefthook)
      task dev                # Start full dev environment (checks deps, migrates DB, inits emulators)
      task dev:stop           # Stop all services
      task test               # Run all tests
      task lint               # Run all linters (equivalent to task lint:all)

      # Linting commands (organized by scope)
      task lint:all           # Run all linters on all files
      task lint:frontend      # Run frontend linters (Biome, ESLint, and TypeScript)
      task lint:python        # Run Python linters (Ruff and MyPy)

      # Specific linters (use these during development)
      task lint:biome         # Format and lint JS/TS/JSON/CSS with Biome
      task lint:eslint        # Lint JavaScript/TypeScript with ESLint
      task lint:typescript    # Type check TypeScript code
      task lint:ruff          # Lint and format Python code with Ruff
      task lint:mypy          # Type check Python code with MyPy
      task lint:codespell     # Check for common misspellings across all files

      # Terraform linters (specialized - not included in lint:all)
      task lint:terraform     # Run all Terraform linters (validate, tflint, trivy)
      task lint:terraform:validate  # Validate Terraform configuration
      task lint:terraform:fmt       # Format Terraform code
      task lint:terraform:tflint    # Lint Terraform code with tflint
      task lint:terraform:trivy     # Security scan Terraform code

      # Database
      task db:migrate         # Run migrations (local)
      task db:drop            # Drop and recreate DB (WARNING: destroys data)
      task db:reset           # Drop DB and re-run migrations

      # Remote Database (Cloud SQL)
      task db:proxy:start     # Start Cloud SQL Proxy
      task db:proxy:stop      # Stop Cloud SQL Proxy
      task db:proxy:status    # Check proxy status
      task db:migrate:remote  # Run migrations on Cloud SQL (auto-starts proxy)

      # Other
      task generate:api-types # Generate TypeScript types from backend
      task --list             # Show all available tasks
      ```

      IMPORTANT: Always check the Taskfile.yaml for the most up-to-date commands and their exact implementations.

  - name: "Testing"
    priority: 75
    content: |
      ### Test Organization and Markers

      The project uses pytest markers to organize tests by duration and purpose across multiple services (indexer, crawler, rag):

      ```bash
      # Quick unit tests (default - no marker needed)
      pytest services/indexer/tests/          # Runs unit tests only (~8s)

      # Smoke tests - Essential functionality checks (< 1 min)
      E2E_TESTS=1 pytest -m "smoke"          # Quick e2e validation

      # Quality assessment tests (2-5 min)
      E2E_TESTS=1 pytest -m "quality_assessment"  # Moderate quality checks

      # Full e2e test suite (10+ min)
      E2E_TESTS=1 pytest -m "e2e_full"       # Complete integration testing

      # Specialized evaluation tests
      E2E_TESTS=1 pytest -m "semantic_evaluation"  # Semantic similarity tests
      E2E_TESTS=1 pytest -m "ai_eval"        # AI-powered evaluation tests

      # All slow tests
      E2E_TESTS=1 pytest -m "slow"           # Any time-intensive tests
      ```

      ### Test Categories

      **Unit Tests** (no markers):
      - Fast, mocked tests
      - Run by default in CI
      - Cover core logic and error paths
      - ~8-10 seconds total runtime per service

      **E2E Tests** (require `E2E_TESTS=1`):
      - Test real functionality with actual files/URLs
      - Use pytest markers for duration control
      - Include quality validation and semantic checks
      - Support for indexer (file processing) and crawler (web content) pipelines
      - Range from 1 min (smoke) to 10+ min (full)

      ### Running Tests

      **IMPORTANT**: Always run tests from the repository root with PYTHONPATH set:

      ```bash
      # Development workflow
      task test                                    # Run all unit tests
      E2E_TESTS=1 task test                       # Run all tests including e2e

      # Running tests manually (always from root directory)
      PYTHONPATH=. uv run pytest services/indexer/tests/             # Just indexer unit tests
      PYTHONPATH=. uv run pytest services/crawler/tests/             # Just crawler unit tests
      PYTHONPATH=. uv run pytest services/rag/tests/                 # Just RAG unit tests
      PYTHONPATH=. uv run pytest services/scraper/tests/             # Just scraper unit tests

      # Running specific test files or tests
      PYTHONPATH=. uv run pytest services/rag/tests/e2e/retrieval_test.py::test_document_retrieval

      # With E2E tests enabled
      PYTHONPATH=. E2E_TESTS=1 uv run pytest services/rag/tests/e2e/ -m "smoke"

      # Running with specific markers
      PYTHONPATH=. E2E_TESTS=1 uv run pytest -m "quality_assessment" services/rag/tests/
      E2E_TESTS=1 pytest services/indexer/tests/ # Indexer unit + e2e tests
      E2E_TESTS=1 pytest services/crawler/tests/ # Crawler unit + e2e tests
      E2E_TESTS=1 pytest services/scraper/tests/ # Scraper unit + e2e tests

      # CI-friendly patterns
      pytest                                      # Fast unit tests only
      E2E_TESTS=1 pytest -m "smoke"             # Essential e2e validation
      E2E_TESTS=1 pytest -m "not (ai_eval or semantic_evaluation)" # Skip expensive AI tests
      ```

      ### Timeout Configuration

      - Default timeout: 120 seconds (set in `pyproject.toml`)
      - Individual tests can override with `@pytest.mark.timeout(300)`
      - E2E tests have longer timeouts based on complexity
      - Smoke tests: 60-120s, Quality: 180-300s, Full: 600s+

      ### Parallel Test Execution (pytest-xdist)

      The project uses pytest-xdist for parallel test execution to improve CI performance:

      **Configuration:**
      - **Auto-enabled**: Tests run with `-n auto` by default (configured in `pyproject.toml`)
      - **Worker limits**: Max 4 workers locally, 2 in CI (GitHub Actions)
      - **Load balancing**: Uses `worksteal` distribution for optimal performance
      - **Fail-fast**: Stops on first failure (`-x` flag) for faster feedback

      **xdist Groups:**
      Tests that conflict when run in parallel are automatically grouped using `@pytest.mark.xdist_group()`:

      ```python
      # Automatic grouping for database tests (configured in services/conftest.py)
      # Tests using these fixtures are automatically grouped by service:
      async def test_with_database(async_session_maker, project): ...
      # -> Grouped as "db_rag", "db_indexer", etc.

      # Manual grouping for tests that need specific isolation:
      @pytest.mark.xdist_group("ai_completion")
      async def test_llm_call(): ...

      @pytest.mark.xdist_group("model_loading")
      async def test_embedding_model(): ...
      ```

      **Automatic Database Grouping:**
      - Tests using database fixtures are automatically grouped by service module
      - Prevents Docker container conflicts between parallel workers
      - Configured in `services/conftest.py` - modifies test items during collection

      **Disabling xdist:**
      - Local development: `pytest -n 0` or `PYTEST_XDIST_WORKERS=0`
      - Single test debugging: Use `-n 0` to run sequentially

      **Model Preloading:**
      - SentenceTransformer and spaCy models are preloaded in session fixtures
      - Prevents timeouts during parallel test execution
      - Configured in `services/rag/tests/conftest.py`

      ### Writing E2E Tests

      **Unit Tests**: No markers needed - they run by default

      **E2E Tests**: Use the `@e2e_test` decorator from `testing.e2e_utils`:

      ```python
      from testing.e2e_utils import E2ETestCategory, e2e_test

      # Quick smoke test (< 1 min)
      @e2e_test(category=E2ETestCategory.SMOKE, timeout=60)
      async def test_basic_extraction(logger: logging.Logger) -> None:
          ...

      # Quality assessment (2-5 min)
      @e2e_test(category=E2ETestCategory.QUALITY_ASSESSMENT, timeout=180)
      async def test_extraction_quality(logger: logging.Logger) -> None:
          ...

      # Full e2e test (10+ min)
      @e2e_test(category=E2ETestCategory.E2E_FULL, timeout=600)
      async def test_comprehensive_pipeline(logger: logging.Logger) -> None:
          ...

      # Semantic evaluation
      @e2e_test(category=E2ETestCategory.SEMANTIC_EVALUATION)
      async def test_embedding_similarity(logger: logging.Logger) -> None:
          ...

      # AI-powered evaluation
      @e2e_test(category=E2ETestCategory.AI_EVAL)
      async def test_llm_quality_assessment(logger: logging.Logger) -> None:
          ...
      ```

      The decorator handles:
      - `E2E_TESTS` environment variable checking
      - pytest markers (smoke, quality_assessment, etc.)
      - timeout configuration
      - performance tracking and result persistence

      **Guidelines**:
      - Always use functional pytest patterns (no class-based tests)
      - Set appropriate timeouts based on test complexity
      - Unit tests should complete in seconds, not need markers

  - name: "Git Hooks (Lefthook)"
    priority: 70
    content: |
      The project uses lefthook for git hooks. It's automatically installed during `task setup`.

      - **pre-commit**: Runs linters on staged files and auto-fixes issues
      - **commit-msg**: Validates commit messages follow conventional commits format

      To manually install/update hooks: `uv run lefthook install`

  - name: "Patterns"
    priority: 65
    content: |
      ### Backend Endpoint

      ```python
      @post("/items", allowed_roles=[UserRoleEnum.MEMBER])
      async def create_item(data: TypedDict, session_maker: async_sessionmaker[Any]) -> dict:
          async with session_maker() as session, session.begin():
              # operations
              await session.commit()
              return {"id": str(item.id)}
      ```

      ### Response Building Pattern

      ```python
      response: ItemResponse = {
          "id": str(item.id),
          "name": item.name,
          "created_at": item.created_at.isoformat(),
      }

      # Add optional fields conditionally
      if item.description:
          response["description"] = item.description
      ```

      ### Frontend API

      ```typescript
      export async function createItem(data: API.CreateItem.RequestBody) {
      	return withAuthRedirect(
      		getClient()
      			.post(`items`, {
      				headers: await createAuthHeaders(),
      				json: data,
      			})
      			.json<API.CreateItem.ResponseBody>(),
      	);
      }
      ```

  - name: "TypeScript Guidelines"
    priority: 60
    content: |
      - Next.js App Router, TypeScript strict, Vitest
      - Ky client with generated types from `@/types/api-types`
      - Wrap API calls with `withAuthRedirect`
      - Backend returns 400 for validation errors
      - Use `getEnv()` for typed environment variables
      - Use object or array destructuring wherever possible
      - Prefer early returns and guard clauses
      - Use `NotRequired` in TypedDict for optional fields

      ### Important Conventions

      - never use `any` as a type.
      - search for types, including from 3rd party libraries, to determine the correct type to use.
      - use nullish coalescing and optional chaining whenever required.
      - use type-guards and type predicates (use "@tool-belt/type-predicates" package as required)
      - use factories for testings (see: frontend/testing/factories.ts, which s aliased as "::testing/factories")

  - name: "Python Guidelines"
    priority: 55
    content: |
      - Litestar + msgspec serialization
      - TypedDict: Use `NotRequired[type]` not `type | None`
      - Check entity exists before updates
      - Use `logger.exception()` not `logger.error(..., exc_info=True)`
      - **Logging**: Use structlog with key=value pairs, not f-strings (e.g. `logger.info("Created job", job_id=str(job.id))`)
      - Avoid `global` - use singleton classes
      - Use `get_env()` with fallbacks
      - Always use UUIDs as strings in responses (convert with `str()`)
      - Use `.isoformat()` for datetime serialization
      - Polymorphic SQLAlchemy models for flexible schemas
      - **Database**: Handle unique constraint violations gracefully with existence checks

  - name: "GitOps and Deployment"
    priority: 52
    content: |
      ### Branch Strategy

      - **development**: Staging environment (auto-deploys)
      - **main**: Production environment (when ready)
      - All CI/CD workflows run on both branches

      ### Frontend Deployment Environments

      - **Staging**:
        - URL: `https://staging--grantflow-staging.us-central1.hosted.app`
        - Project: `grantflow-staging`
        - Branch: `development`
        - Config: `apphosting.staging.yaml`
        - Mock API/Auth enabled by default
      - **Production**:
        - URL: `https://grantflow.ai`
        - Project: `grantflow`
        - Branch: `main`
        - Config: `apphosting.production.yaml`
        - Mock features disabled

      ### Firebase App Hosting Configuration

      - Environment-specific configs: `apphosting.{environment}.yaml`
      - Set environment name in Firebase Console (Settings → Environment)
      - Secrets use environment suffixes (e.g., `NEXT_PUBLIC_SITE_URL_STAGING`)
      - Deploy with: `firebase deploy --project {project}`

      ### Docker Image Tagging

      - **Development branch**: `staging-{sha}`, `staging-latest`
      - **Main branch**: `{sha}`, `latest`
      - **Releases**: `{release-tag}`

      ### Deployment Architecture

      - **Backend Services**: Cloud Run (backend, crawler, indexer, rag, scraper)
      - **Frontend**: Firebase App Hosting (branch-based deployments)
      - **Database**: Cloud SQL PostgreSQL
      - **Storage**: GCS buckets (staging uses `grantflow-staging-uploads`)

      ### Terraform Management

      - Currently single environment (staging)
      - Use `tofu` instead of `terraform` command
      - Environment variable in `variables.tf` set to "staging"
      - Services pull from `staging-latest` Docker tags
      - Infrastructure as Code for all GCP resources

      ### Cloud SQL Remote Access

      - Use Cloud SQL Proxy for local connections
      - Connection string conversion: Unix socket → TCP (127.0.0.1:5432)
      - Always drop ENUMs and tables when resetting database
      - Use `task db:migrate:remote` for remote migrations

  - name: "Key Learnings"
    priority: 50
    content: |
      ### Wizard Patterns

      Create draft entities early for file uploads. Applications start as "Untitled Application", debounced title updates (500ms), validate title + documents before proceeding. **For detailed wizard implementation, see [WIZARD_FEATURE.md](./WIZARD_FEATURE.md)**.

      ### Pub/Sub Handling

      Handle duplicates gracefully in consumers. Check existence before insert, use `ON CONFLICT DO NOTHING`, return 200 for processed messages.

      **Topics**: `url-crawling`, `frontend-notifications`, `file-indexing`, `rag-processing`

      ### State Management Patterns

      - Use Zustand for complex multi-step flows
      - Separate UI state from domain state
      - Create focused actions for specific operations
      - Use polling sparingly with proper cleanup

      ### WebSocket Integration

      Extract to custom hooks, use `react-use-websocket`, convert HTTP→WS URLs, handle null IDs gracefully. Endpoint: `/projects/{id}/applications/{id}/notifications`

      ### Environment Variables

      - **Frontend**: `getEnv()` throws if missing required vars
      - **Backend**: `get_env()` with fallback values
      - **Build-time**: `process.env.NODE_ENV` in Next.js
      - **Services**: Need both `GOOGLE_CLOUD_PROJECT` and `GCP_PROJECT_ID`
      - **Bucket names**: Use environment-specific names (e.g., `grantflow-staging-uploads`)

  - name: "Monitoring and Observability"
    priority: 48
    content: |
      ### OpenTelemetry Integration

      The project uses OpenTelemetry for distributed tracing and monitoring across all services:

      - **Trace ID System**: Uses `trace_id` (renamed from correlation_id) for request correlation
      - **Structured Logging**: All logs include trace_id and span_id automatically via structlog
      - **Distributed Tracing**: Full request traces from frontend → backend → services
      - **Custom Metrics**: Business and infrastructure metrics using OpenTelemetry meters

      ### Implementation

      **Services Configuration**:
      ```python
      # All services call this on startup
      from packages.shared_utils.src.otel import configure_otel
      configure_otel("service-name")
      ```

      **Span Creation**:
      ```python
      from packages.shared_utils.src.tracing import start_span_with_trace_id

      with start_span_with_trace_id("operation_name", trace_id=trace_id) as span:
          span.set_attribute("key", "value")
          # operation logic
      ```

      **Pub/Sub Tracing**:
      - All Pub/Sub messages include trace context propagation
      - Uses OpenTelemetry TraceContextTextMapPropagator
      - Child spans automatically continue parent traces

      ### Discord Alerting

      **Alert Policies** (Terraform-managed):
      - Service completely down (zero 2xx responses for 5+ minutes)
      - Database disconnected (no connections for 3+ minutes)
      - Scraper not running (no activity for 48+ hours)
      - Pub/Sub dead (high undelivered messages for 20+ minutes)
      - High error rate (>50% errors for 10+ minutes)

      **Discord Webhook**: Set via `DISCORD_WEBHOOK_URL` environment variable in all services

      ### Environment Variables

      ```bash
      # OpenTelemetry configuration
      GOOGLE_CLOUD_PROJECT=grantflow
      ENABLE_CLOUD_TRACE=1  # Optional: enable Cloud Trace export in development
      DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/...  # For monitoring alerts
      ```

      ### Key Files

      - `packages/shared_utils/src/otel.py` - OpenTelemetry configuration
      - `packages/shared_utils/src/tracing.py` - Span utilities and trace_id integration
      - `packages/shared_utils/src/logger.py` - Enhanced with OTEL context
      - `packages/shared_utils/src/metrics.py` - Custom business metrics
      - `terraform/modules/monitoring/` - Alert policies and notification channels

  - name: "Security"
    priority: 45
    content: |
      Firebase auth + JWT, environment variables for secrets, never commit credentials.

  - name: "Testing Conventions"
    priority: 40
    content: |
      ### Test File Naming Conventions

      - **Python**: Test files must end with `_test.py` (e.g., `user_service_test.py`, `auth_test.py`)
        - NOT `test_user_service.py` - this format is not allowed
      - **TypeScript**: Test files must use `.spec.ts` or `.spec.tsx` (e.g., `Button.spec.tsx`, `auth.spec.ts`)
        - NOT `.test.ts` or `.test.tsx` - only `.spec` extension is allowed

      ### Frontend Testing

      - Use Vitest with React Testing Library
      - **NO mocking stores** - use real Zustand stores with setState
      - Mock server actions and API calls, not state management
      - Always use factories from `::testing/factories` (alias for `frontend/testing/factories`)
      - Place shared utils and fixtures in the testing module
      - Use `vi.fn()` for mocking functions you need to spy on
      - Test behavior and user interactions, not implementation details

      ### Backend Testing

      - pytest async, focus on API behavior
      - Use real PostgreSQL for all tests
      - Mock external services, not internal components
      - Verify WebSocket integration with proper test clients

  - name: "Common Pitfalls and Solutions"
    priority: 37
    content: |
      ### YAML Syntax in Taskfile

      - Colons in echo statements need quotes: `- 'echo "Key: value"'`
      - Multi-line shell scripts use pipe: `|` after the command
      - Environment variables with `sh:` need proper YAML formatting

      ### Cloud SQL Connection Strings

      - Cloud Run uses Unix socket: `/cloudsql/project:region:instance`
      - Local development needs TCP: `127.0.0.1:5432`
      - Always strip socket path and replace with TCP for local connections

      ### Terraform State Issues

      - Authentication errors: Run `gcloud auth application-default login`
      - State lock issues: Check if another process is running
      - Use `tofu` command, not `terraform`

      ### Docker Build Failures

      - Frontend needs build args for environment variables
      - Use multi-stage builds to minimize image size
      - Always use `lifecycle.ignore_changes` for image tags in Terraform

      ### Database Migration Issues

      - Drop ENUMs before dropping tables: `DROP TYPE IF EXISTS typename CASCADE`
      - Check for existing alembic_version table
      - Use `CASCADE` when dropping tables with foreign keys

