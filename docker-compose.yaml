services:
    db:
        image: pgvector/pgvector:pg17
        restart: always
        environment:
            POSTGRES_DB: grantflow
            POSTGRES_USER: grantflow
            POSTGRES_PASSWORD: grantflow
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        ports:
            - "8000:8000"
        volumes:
            - ./src:/app/src:cached
        command: [ "sanic", "src.main:app" ]
        restart: unless-stopped

volumes:
    postgres_data:
