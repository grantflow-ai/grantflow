services:
    db:
        profiles:
            - all
            - backend-services
            - indexer
            - crawler
            - backend
        image: pgvector/pgvector:pg17
        restart: always
        environment:
            POSTGRES_USER: local
            POSTGRES_PASSWORD: local
            POSTGRES_DB: local
        ports:
            - "5432:5432"
        volumes:
            - data:/var/lib/postgresql/data
            - ./packages/db/pg-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "local", "-d", "local"]
            interval: 1s
            timeout: 5s
            retries: 10

    valkey:
        profiles:
            - all
            - backend-services
            - backend
        image: valkey/valkey:latest
        restart: always
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "valkey-cli", "ping"]
            interval: 1s
            timeout: 5s
            retries: 10

    gcs-emulator:
        profiles:
            - all
            - backend-services
            - indexer
            - crawler
            - backend
        image: fsouza/fake-gcs-server:latest
        restart: always
        ports:
            - "4443:4443"
        volumes:
            - gcs-data:/storage
        command: ["-scheme", "routes", "-port", "4443", "-public-host", "localhost", "-backend", "memory"]
        healthcheck:
            test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4443"]
            interval: 1s
            timeout: 5s
            retries: 10

    backend:
        profiles:
            - all
            - backend-services
            - backend
        build:
            dockerfile: ./services/backend/Dockerfile
            platforms:
                - "linux/x86_64" # needed due to spaCy build issues on Mac linux
        environment:
            DATABASE_CONNECTION_STRING: postgresql+asyncpg://local:local@db:5432/local
            VALKEY_CONNECTION_STRING: redis://valkey:6379/0
        env_file:
            - ./services/backend/.env
        ports:
            - "8000:8000"
        volumes:
            - ./services/backend/src:/app/src:cached
        command: "uvicorn src.api.main:app --host 0.0.0.0 --log-level info --reload"
        depends_on:
            db:
                condition: service_healthy
            valkey:
                condition: service_healthy
            gcs-emulator:
                condition: service_healthy

    indexer:
        profiles:
            - all
            - backend-services
            - indexer
        build:
            dockerfile: ./services/indexer/Dockerfile
        environment:
            DATABASE_CONNECTION_STRING: postgresql+asyncpg://local:local@db:5432/local
            GOOGLE_CLOUD_PROJECT: grantflow-dev
            GOOGLE_CLOUD_REGION: us-central1
            STORAGE_EMULATOR_HOST: http://gcs-emulator:4443
            GCS_BUCKET_NAME: grantflow-uploads
        env_file:
            - ./services/indexer/.env
        ports:
            - "8001:8000"
        volumes:
            - ./services/indexer/src:/app/src:cached
        command: "uvicorn src.main:app --host 0.0.0.0 --log-level info --reload"
        depends_on:
            db:
                condition: service_healthy
            gcs-emulator:
                condition: service_healthy

    crawler:
        profiles:
            - all
            - backend-services
            - crawler
        build:
            dockerfile: ./services/crawler/Dockerfile
        environment:
            DATABASE_CONNECTION_STRING: postgresql+asyncpg://local:local@db:5432/local
            GOOGLE_CLOUD_PROJECT: grantflow-dev
            GOOGLE_CLOUD_REGION: us-central1
            STORAGE_EMULATOR_HOST: http://gcs-emulator:4443
            GCS_BUCKET_NAME: grantflow-uploads
        env_file:
            - ./services/crawler/.env
        ports:
            - "8001:8000"
        volumes:
            - ./services/crawler/src:/app/src:cached
        command: "uvicorn src.main:app --host 0.0.0.0 --log-level info --reload"
        depends_on:
            db:
                condition: service_healthy
            gcs-emulator:
                condition: service_healthy

    frontend:
        profiles:
            - all
            - frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: install
        ports:
            - "3000:3000"
        volumes:
            - ./frontend:/app:cached
        environment:
            # backend is the alias for the backend service in the docker network
            NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:8000
        env_file:
            - ./frontend/.env
        command: "pnpm dev"
        depends_on:
            - backend

volumes:
    data:
    gcs-data:
