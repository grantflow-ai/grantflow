$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/mcp-config.schema.json
version: "1.0"
mcp_servers:
    - name: ai-rulez
      description: AI-Rulez MCP server for configuration management
      command: uv
      args:
        - tool
        - run
        - ai-rulez
        - mcp
    - name: linear-server
      description: Linear issue tracking integration
      command: npx
      args:
        - -y
        - '@linear/mcp@latest'
    - name: figma
      description: Figma design integration
      transport: http
      url: https://mcp.figma.com/mcp
