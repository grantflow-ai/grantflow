# Catalog of curated/global grant templates.
# These entries feed scripts/generate_predefined_templates.py to
# produce predefined templates without relying on CFP documents.
templates:
  - key: nih_r01_standard
    name: NIH R01 Standard Research Plan
    granting_institution_full_name: National Institutes of Health
    granting_institution_abbreviation: NIH
    grant_type: RESEARCH
    activity_code: R01
    guideline_source: testing/test_data/sources/guidelines/nih/NIH- Instructions for Research (R).pdf
    guideline_version: Forms-H
    description: >-
      Core sections for NIH R01 opportunities sourced from the Forms-H
      "Research (R) instructions" guideline book.
    overrides:
      enforce_length_constraints: true
      include_specific_aims: true
  - key: nih_r21_exploratory
    name: NIH R21 Exploratory/Developmental Research Plan
    granting_institution_full_name: National Institutes of Health
    granting_institution_abbreviation: NIH
    grant_type: RESEARCH
    activity_code: R21
    guideline_source: testing/test_data/sources/guidelines/nih/NIH- Instructions for Research (R).pdf
    guideline_version: Forms-H
    description: >-
      Exploratory NIH R21 template derived from the same guideline volume,
      with shorter background and data expectations.
    overrides:
      enforce_length_constraints: true
      include_specific_aims: true
